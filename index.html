<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CDL War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#111318;--s1:#181b22;--s2:#1e222b;--s3:#262b36;--s4:#2f3544;
--bd:#2f3544;--bd2:#3d4556;
--h:#f0f2f5;--tx:#c8cdd8;--sub:#8b93a5;--cap:#5e667a;
--grn:#10b981;--grn2:#065f46;--grn3:#022c22;
--red:#f87171;--red2:#991b1b;
--acc:#60a5fa;--mono:'JetBrains Mono',monospace;--sans:Inter,system-ui,sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.w{max-width:1160px;margin:0 auto;padding:0 20px 80px}

.hd{padding:16px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--bd)}
.hd-t{font-size:24px;font-weight:900;color:var(--h);letter-spacing:-.5px}
.hd-t span{font-weight:400;color:var(--cap)}
.hd-m{display:flex;gap:20px}
.hd-n b{font-family:var(--mono);font-size:18px;color:var(--grn);display:block}
.hd-n span{font-size:9px;color:var(--cap);text-transform:uppercase;letter-spacing:.8px;font-weight:600}

.tb{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:16px}
.tb button{padding:10px 18px;font-size:12px;font-weight:700;color:var(--cap);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.1s;letter-spacing:.3px}
.tb button:hover{color:var(--tx)}
.tb button.on{color:var(--h);border-bottom-color:var(--grn)}

.sec{font-size:12px;font-weight:900;color:var(--h);letter-spacing:2px;text-transform:uppercase;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--bd)}

.c{background:var(--s1);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:.15s}
.c:hover{border-color:var(--bd2)}
.c-h{padding:14px 16px;cursor:pointer;user-select:none}
.c-b{padding:4px 16px 16px;display:none;border-top:1px solid var(--s3)}
.c-b.on{display:block}

.bg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.3px;display:inline-flex;align-items:center}

/* STATS TABLE — Dunks & Threes style */
.dt{width:100%;border-collapse:collapse;background:var(--s1)}
.dt th{padding:9px 5px;text-align:center;font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.8px;border-bottom:2px solid var(--bd);cursor:pointer;user-select:none;white-space:nowrap;background:var(--s2)}
.dt th.on{color:var(--grn)}
.dt th:first-child{text-align:left;padding-left:10px}
.dt td{padding:0;text-align:center;border-bottom:1px solid var(--s3);vertical-align:middle}
.dt td:first-child{text-align:left;padding:6px 10px}
.dt tr:hover td{background:var(--s3) !important}
/* Each stat cell: raw value + percentile underneath, cell bg = percentile color */
.sc{padding:6px 4px;min-width:50px;border-radius:3px;margin:1px}
.sc .rv{font-family:var(--mono);font-size:13px;font-weight:800;color:#fff}
.sc .pc{font-family:var(--mono);font-size:9px;font-weight:800;color:rgba(255,255,255,.7);margin-top:1px}
/* CIR column highlighted */
.sc.cir{border-left:2px solid var(--bd);border-right:2px solid var(--bd)}

/* Mode bars */
.mb{flex:1}
.mb-t{display:flex;justify-content:space-between;margin-bottom:2px}
.mb-l{font-size:10px;color:var(--sub);font-weight:700;letter-spacing:1px}
.mb-v{font-family:var(--mono);font-size:12px;font-weight:700}
.mb-b{height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.mb-f{height:100%;border-radius:3px}

/* Heatmap */
.hm{display:grid;gap:1px;background:var(--s2);border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
.hm-c{padding:7px 2px;text-align:center;font-family:var(--mono);font-weight:600;font-size:11px;min-width:44px}
.hm-h{font-size:10px;font-weight:700;color:var(--sub);padding:7px 3px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}}

.bx{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:12px 14px}
.dg{font-size:13px;color:var(--tx);line-height:1.75;background:var(--s2);border:1px solid var(--bd);padding:12px 14px;border-radius:6px;margin-top:6px}
.sr{width:100%;padding:9px 12px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--h);font-size:13px;outline:none;font-family:var(--sans)}
.sr:focus{border-color:var(--grn)}
.sr::placeholder{color:var(--cap)}
.pl{display:flex;gap:3px;flex-wrap:wrap;margin:6px 0}
.pp{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid var(--bd);background:var(--s2);color:var(--sub);cursor:pointer;transition:.1s}
.pp:hover{border-color:var(--sub);color:var(--tx)}
.pp.on{border-color:var(--grn);color:var(--grn);background:var(--grn3)}

.cm{position:fixed;bottom:0;left:0;right:0;background:rgba(17,19,24,.97);border-top:1px solid var(--bd);padding:8px 24px;display:none;align-items:center;justify-content:center;gap:12px;z-index:100;backdrop-filter:blur(8px)}
.cm.on{display:flex}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;place-items:center;backdrop-filter:blur(3px)}.mo.on{display:grid}
.ml{background:var(--s1);border:1px solid var(--bd);border-radius:8px;max-width:800px;width:95%;max-height:90vh;overflow-y:auto;padding:24px}
.cv{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;background:var(--s3);font-size:8px;color:var(--sub);transition:transform .2s;flex-shrink:0}
.cv.on{transform:rotate(180deg)}
</style></head><body>
<div class="w">
<div class="hd">
<div><div class="hd-t">CDL War Room <span>v12</span></div></div>
<div class="hd-m">
<div class="hd-n"><b>70.2%</b><span>Backtest</span></div>
<div class="hd-n"><b>48</b><span>Players</span></div>
<div class="hd-n"><b>131</b><span>Matches</span></div>
</div>
</div>
<div class="tb" id="TT"></div>
<div id="A"></div>
<div class="cm" id="CM">
<span style="font-size:10px;color:var(--cap);font-weight:700;letter-spacing:1px">COMPARE</span>
<span style="font-weight:700;color:var(--acc)" id="c1">&mdash;</span>
<span style="color:var(--cap)">vs</span>
<span style="font-weight:700;color:var(--red)" id="c2">&mdash;</span>
<button style="background:var(--grn);color:#000;padding:6px 14px;border:none;border-radius:4px;font-weight:700;font-size:11px;cursor:pointer" onclick="sCmp()">Compare</button>
<button style="background:var(--s3);color:var(--sub);border:1px solid var(--bd);padding:6px 14px;border-radius:4px;font-weight:600;font-size:11px;cursor:pointer" onclick="xCmp()">Clear</button>
</div>
<div class="mo" id="MD"><div class="ml" id="MC"></div></div>
</div>
<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const TC={"TX":"#92c83e","RYD":"#d4a843","MIA":"#ff6b00","LAT":"#e4002b","CAR":"#00b4d8","FV":"#ff4655","MIN":"#9e9e9e","M8":"#c77dff","TOR":"#ff477e","BOS":"#2d6a4f","VAN":"#0cb5a0","C9":"#4ea8de"};
const TNAME={"TX":"OpTic Texas","RYD":"Riyadh Falcons","MIA":"Miami Heretics","LAT":"LA Thieves","CAR":"Carolina Royal Ravens","FV":"FaZe Vegas","MIN":"G2 Minnesota","M8":"Gentlemates Paris","TOR":"Toronto KOI","BOS":"Boston Breach","VAN":"Vancouver Surge","C9":"Cloud9 New York"};

const P=[
{n:"SupeR",t:"MIA",o:98,ro:"OPENING PLAYMAKER",kd:1.15,bpr:1.16,lan:-.13,fb:20.8,z:{bpr:1.46,hp:1.32,hpD:.39,hpH:.22,hpE:-.74,snd:1.96,od:2.47,kpr:2.01,ovl:1.5,gl:1.58,ntk:1.7},m2:{hpK:1.14,sndK:1.38,ovlK:1.20,hpDmg:3308,hpHill:64.5,hpEng:58.9,sndOd:.73,ovlG:14},m1:{bpr:1.04,hpK:1.04,sndK:1.38,ovlK:1.12},str:"Best SND player in the league. Wins 1 in 5 opening gunfights before anyone else shoots. MIA wins SND while being outslayed 60% of the time because of him. HP and OVL goals both rising.",wk:"Slower HP pace than ideal. Recent cold streak to 0.93. Three-role fatigue risk in a long bracket.",dig:"The most impactful player in the CDL. His first blood rate warps how opponents play SND against Miami. When he gets the opening pick it is 4v3 before anyone else fires. Raid SND is absurd at 1.64 KD. The concern heading into LAN is the cold streak plus a historical tendency to drop at events. If that continues on stage, Miami has a ceiling problem because nobody else on this roster carries SND the way he does."},
{n:"Mercules",t:"TX",o:96,ro:"LURK ASSASSIN",kd:1.12,bpr:1.20,lan:-.10,fb:10.8,z:{bpr:1.84,hp:.42,hpD:.6,hpH:.44,hpE:.95,snd:3.08,od:-.06,kpr:2.12,ovl:.76,gl:1.3,ntk:.2},m2:{hpK:1.05,sndK:1.59,ovlK:1.11,hpDmg:3344,hpHill:67.2,hpEng:62.7,sndOd:.50,ovlG:13},m1:{bpr:1.16,hpK:1.07,sndK:1.48,ovlK:1.09},str:"Highest impact rating in the league. SND KD is otherworldly through lurking and trading. Currently on a 1.74 hot streak. Peaking at exactly the right time for LAN. Positive on every map in every mode.",wk:"Rarely takes the first fight — if teammates get picked early he is stuck in bad spots. HP KD is functional not dominant.",dig:"The most underrated player in CoD. His 1.59 SND KD leads the league by a mile because of a lurk/trade style that punishes overaggressive teams. He is the reason Texas wins 80% of Round 11s. On Den his SND is filthy — 2.16 KD. He is positive on literally every map in every mode which no other player can claim. Hot streak could not be better timed for LAN."},
{n:"Scrap",t:"LAT",o:94,ro:"DAMAGE ENGINE",kd:1.14,bpr:1.14,lan:-.02,fb:0,z:{bpr:1.27,hp:1.52,hpD:2.74,hpH:1.31,hpE:2.27,snd:0,od:-.06,kpr:.15,ovl:1.01,gl:1.87,ntk:.81},m2:{hpK:1.16,sndK:1.01,ovlK:1.14,hpDmg:3699,hpHill:77.7,hpEng:65.7,sndOd:.50,ovlG:15},m1:{bpr:1.0,hpK:1.06,sndK:1.03,ovlK:.94},str:"More HP damage than anyone in the league by a wide margin. Fastest anchor in CoD. Biggest riser from M1 to M2Q. OVL goals top 3.",wk:"SND is exactly average — no first blood creation. Passive sniper style limits playmaking in clutch SND situations.",dig:"The engine that makes LAT go. 3700 HP damage per 10 minutes is so far above the league that it warps how opponents rotate against them. Was #1 on the BO6 Top 20 and has maintained that level. The question is whether average SND holds LAT back in bracket play where you cannot avoid Game 2 and Game 5."},
{n:"Huke",t:"TX",o:93,ro:"SPACE CREATOR",kd:1.10,bpr:1.15,lan:-.11,fb:0,z:{bpr:1.37,hp:.72,hpD:.88,hpH:-1.47,hpE:1.26,snd:-.64,od:-.06,kpr:-.62,ovl:1.58,gl:-.72,ntk:-.08},m2:{hpK:1.08,sndK:.89,ovlK:1.21,hpDmg:3390,hpHill:44.0,hpEng:63.4,sndOd:.50,ovlG:6},m1:{bpr:1.02,hpK:.95,sndK:.70,ovlK:1.06},str:"Biggest improvement on Texas. OVL KD jumped from 1.06 to 1.21 which is elite. Creates space for Dashy to anchor through aggressive engagement.",wk:"Drops at LAN consistently. SND is a clear weakness. Never anchors so Texas needs him on the map to keep pace.",dig:"Transformed from a 0.95 to 1.10 through an OVL renaissance. The LAN concern is real — drops about 0.08 across multiple events. Texas wins despite this because their structure compensates but Huke is the player most at risk of a bad individual series at the wrong time."},
{n:"Cellium",t:"RYD",o:92,ro:"HP/OVL ANCHOR",kd:1.15,bpr:1.07,lan:-.04,fb:0,z:{bpr:.61,hp:1.81,hpH:2.69,hpE:-2.05,snd:-1.92,od:-1.43,kpr:-1.93,ovl:2.32,gl:1.3,ntk:1.98},m2:{hpK:1.19,sndK:.65,ovlK:1.30,hpDmg:3198,hpHill:94.5,hpEng:56.0,sndOd:.375,ovlG:13},m1:{bpr:1.07,hpK:1.07,sndK:1.35,ovlK:1.04},str:"Best anchor in CoD. 94.5 seconds on hill per 10 minutes. OVL is elite. Clean-up rate among the best in the league.",wk:"SND collapsed from 1.35 to 0.65 between stages — not a slump, a structural breakdown. Riyadh has 36% SND because of him and Exnid.",dig:"Most extreme player profile in the CDL. Top 3 in HP and OVL, bottom 3 in SND. The collapse from 1.35 to 0.65 is one of the most dramatic drops this season. Riyadh needs to win 3-0 or 3-1 to avoid Game 5 SND. On Exposure he is a monster — 1.42 OVL KD, 100% win rate all modes. Let Exposure through the veto and Riyadh wins."},
{n:"Abuzah",t:"FV",o:91,ro:"DUAL-THREAT ANCHOR",kd:1.10,bpr:1.06,lan:-.02,fb:0,z:{bpr:.51,hp:-.27,hpH:1.86,snd:2.12,od:2.10,kpr:1.57,ovl:.35,gl:-.43,ntk:-.28},m2:{hpK:.98,sndK:1.41,ovlK:1.06,hpDmg:3193,hpHill:84.4,hpEng:59.6,sndOd:.696,ovlG:7},m1:{bpr:1.13,hpK:1.07,sndK:1.39,ovlK:1.15},str:"Elite SND entry — wins opening duels at 70% rate. Also anchors HP hill at 84.4 seconds. LAN neutral which is rare for SND-first players.",wk:"HP KD goes negative because he absorbs deaths on hill. Declining from 1.14 to 1.05. Overloaded with three roles. FaZe only wins 29% of Round 11s despite his SND dominance.",dig:"FaZe lives and dies with Abuzah. He is their SND entry AND their HP anchor in one player which is an unsustainable role load. HP KD being negative is the direct cost of sitting on the hill. FaZe only closes 29% of tight SND maps which means his individual brilliance is not translating to team clutch."},
{n:"JoeDec",t:"TOR",o:91,ro:"OVL CLOSER",kd:1.11,bpr:1.05,lan:.11,fb:0,z:{bpr:.42,hp:.62,hpD:.8,snd:-.59,ovl:1.91,gl:1.01,ntk:1.26},m2:{hpK:1.07,sndK:.90,ovlK:1.25,hpDmg:3376,hpHill:57.8,hpEng:62.2,sndOd:.50,ovlG:12},m1:{bpr:1.11,hpK:1.11,sndK:1.26,ovlK:1.21},str:"OVL KD is top 3 in the league at 1.25. Gets better at LAN which is valuable. NTK rate is elite meaning he finishes every gunfight.",wk:"SND cratered from 1.26 to 0.90. Lost his SND identity between stages.",dig:"Toronto\'s OVL star and LAN wild card. His +0.11 LAN adjustment is the biggest in the CDL meaning he genuinely transforms on stage. The SND collapse hurts Toronto\'s Game 2 and Game 5 chances. On Den he is the best player in the league at 1.26 KD — if Toronto can force Den every series at LAN, JoeDec makes them dangerous."},
{n:"Dashy",t:"TX",o:90,ro:"ANCHOR | SNIPER",kd:1.00,bpr:1.10,lan:-.04,fb:0,z:{bpr:.89,hp:-.57,hpH:1.97,hpE:-1.0,snd:.1,od:.13,kpr:-.72,ovl:.68,gl:1.01,ntk:.85},m2:{hpK:.95,sndK:1.03,ovlK:1.10,hpDmg:3223,hpHill:85.7,hpEng:58.3,sndOd:.517,ovlG:12},m1:{bpr:1.08,hpK:1.01,sndK:1.03,ovlK:.97},str:"Second-best hill holder in the league at 85.7 seconds. OVL improved significantly. LAN neutral.",wk:"HP KD is negative because he dies on hill. Slowest tempo on Texas. Went 0.78 against Riyadh.",dig:"1.00 KD looks average but he sacrifices his stats so Huke and Shotzzy can slay freely. His job is to sit on the hill and absorb damage and the 85.7 seconds proves he does it. OVL rising from 0.97 to 1.10 shows he is more than just an anchor. Texas SND sniper in Game 5 situations."},
{n:"Simp",t:"FV",o:90,ro:"HP-SLAYER | SND declining",kd:1.12,bpr:1.07,lan:.02,fb:0,z:{bpr:.61,hp:1.12,hpD:1.58,snd:.53,kpr:1.13,ovl:-.38,ntk:-.32},m2:{hpK:1.12,sndK:1.11,ovlK:.97,hpDmg:3507,hpHill:64.2,hpEng:62.5,sndOd:.516,ovlG:11},m1:{bpr:1.14,hpK:1.12,sndK:1.28,ovlK:1.17},str:"HP elite with huge damage output. SND pace is fast. Had the best BO6 run at the end of last year.",wk:"Declining from 1.16 to 1.07. OVL went negative. Lost his multi-mode identity — only elite in HP now. SND fell from 1.28 to 1.11.",dig:"Was elite everywhere in M1 at 1.16 KD. Now only elite in Hardpoint. The question for LAN is whether this is a temporary slump or a permanent identity shift. He recovered from a terrible 0.81 Champs last year to put up 1.12 so the bounce-back ability is there. LAN neutral."},
{n:"Shotzzy",t:"TX",o:90,ro:"ENTRY FRAGGER",kd:1.03,bpr:1.17,lan:-.07,fb:0,z:{bpr:1.56,hp:-.17,hpD:-.91,snd:1.70,od:1.16,kpr:1.57,ovl:.60,ntk:-.28},m2:{hpK:.99,sndK:1.33,ovlK:1.09,hpDmg:3092,hpHill:56.2,hpEng:61.2,sndOd:.611,ovlG:7},m1:{bpr:1.08,hpK:.93,sndK:1.06,ovlK:1.09},str:"SND surged from 1.06 to 1.33 with the highest entry rate in the league. Impact rating is elite. Historically gets better at LAN.",wk:"HP damage output is the lowest on Texas. Cannot carry HP maps alone.",dig:"The M2Q transformation story. Went from an average SND player to the league\'s best entry in one stage. His LAN history shows he elevates on stage — 1.14 at LAN vs 1.00 online across BO6. If that pattern holds he might be Texas\'s most important player at the tournament."},
{n:"RenKoR",t:"MIA",o:90,ro:"HP-SLAYER | FLEX",kd:1.17,bpr:1.12,lan:.02,fb:0,z:{bpr:1.08,hp:1.42,snd:1.06,od:1.21,ovl:1.33,ntk:.08},m2:{hpK:1.15,sndK:1.21,ovlK:1.18,hpDmg:3139,hpHill:62.7,hpEng:58.6,sndOd:.615,ovlG:9},m1:{bpr:1.04,hpK:1.29,sndK:.89,ovlK:1.04},str:"Positive in every single statistical category across all modes. SND surged from 0.89 to 1.21. Gets significantly better at LAN.",wk:"HP dipped from 1.29 to 1.15 between stages.",dig:"Miami\'s most complete player and the steadiest hand on the roster. When SupeR has an off map, RenKoR keeps Miami alive. His LAN split is +0.15 which is among the best in the league. Combined with SupeR\'s SND, Miami has the best SND duo heading into the tournament."},
{n:"Kips",t:"TOR",o:90,ro:"SNIPER/ENTRY | 3-ROLE",kd:1.07,bpr:1.14,lan:0,fb:0,z:{bpr:1.27,hp:.42,hpD:2.29,hpE:1.92,snd:1.54,kpr:1.79,ovl:.19,ntk:-.77},m2:{hpK:1.05,sndK:1.30,ovlK:1.04,hpDmg:3625,hpHill:74.2,hpEng:64.9,sndOd:.571,ovlG:6},m1:null,str:"Second-highest HP damage in the league. SND is elite. Covers sniper, entry, and anchor by himself — a three-role player which is incredibly rare.",wk:"OVL is average. NTK below average. Three-role load creates fatigue risk in long series.",dig:"Everything runs through Kips. Toronto is a playoff team because of him and mediocre without him. He covers three roles by himself which is both his superpower and his biggest risk — in a 5-map series the fatigue shows up in maps 4 and 5. Signed in February after ReeaL was benched and immediately transformed this roster."},
{n:"Spart",t:"BOS",o:87,ro:"SNIPER | HARD-ANCHOR",kd:1.10,bpr:1.03,lan:0,fb:0,z:{bpr:.23,hp:.32,hpD:.57,hpH:1.16,snd:1.06,od:1.78,ovl:1.33,gl:-1.3,ntk:.29},m2:{hpK:1.04,sndK:1.21,ovlK:1.18,hpDmg:3338,hpHill:75.8,hpEng:60.2,sndOd:.667,ovlG:4},m1:null,str:"Positive in every single mode. SND opening duel rate is top 5. OVL is elite. Does everything well.",wk:"On a 3-8 team that outslays opponents and loses 47% of the time. His talent is being completely wasted by bad teammates.",dig:"The most wasted talent in the CDL. On Texas, Miami, or Riyadh he would be a franchise player. Boston outslays opponents and still loses nearly half the time because nobody plays objective around Spart. He needs Owakening and a real roster around him."},
{n:"Pred",t:"RYD",o:85,ro:"SPACE CREATOR",kd:1.09,bpr:1.09,lan:.09,fb:0,z:{bpr:.8,hp:.52,snd:.37,od:.6,kpr:.59,ovl:1.09,ntk:.85},m2:{hpK:1.06,sndK:1.08,ovlK:1.15,hpDmg:3234,hpHill:45.1,hpEng:60.3,sndOd:.56,ovlG:7},m1:{bpr:1.05,hpK:1.02,sndK:1.26,ovlK:1.21},str:"OVL is elite. Positive across every category. Dropped 1.26 against Texas as the series MVP. NTK solid.",wk:"SND dipped from 1.26 to 1.08. Gets slightly worse at LAN.",dig:"Riyadh\'s emerging second star. His perimeter HP style creates space for Cellium to anchor. Unlike Cellium and Exnid, Pred is actually functional in SND which matters enormously for Riyadh\'s Game 5 chances. His 1.26 KD against Texas showed what his ceiling looks like."},
{n:"Sib",t:"M8",o:84,ro:"SUPPORT (lost identity)",kd:.96,bpr:.95,lan:.10,fb:0,z:{bpr:-.53,hp:-.67,hpD:.49,hpE:.87,snd:-.8,ovl:.27,ntk:.37},m2:{hpK:.94,sndK:.86,ovlK:1.05,hpDmg:3325,hpHill:53.7,hpEng:62.5,sndOd:.50,ovlG:6},m1:{bpr:1.08,hpK:1.0,sndK:1.12,ovlK:1.07},str:"Gets dramatically better at LAN — went from 0.96 online to 1.14 at events across BO6. That is a different player entirely.",wk:"Lost his identity online. SND collapsed from 1.12 to 0.86. Feeding pattern in HP.",dig:"The ultimate LAN wildcard. Online he looks like a replacement-level player. At tournaments he transforms into an above-average starter. M8 is banking on this split continuing — if LAN Sib shows up they are a legitimately dangerous team in the bracket. If online Sib shows up they are a first-round exit."},
{n:"Ghosty",t:"M8",o:83,ro:"HARD-ANCHOR",kd:1.05,bpr:1.02,lan:-.04,fb:0,z:{bpr:.13,hp:.82,hpD:1.12,hpH:1.75,snd:-.27,ovl:-.22,ntk:1.13},m2:{hpK:1.09,sndK:.96,ovlK:.99,hpDmg:3429,hpHill:83.0,hpEng:60.6,sndOd:.529,ovlG:8},m1:{bpr:1.13,hpK:1.15,sndK:1.13,ovlK:1.01},str:"Third-best hill holder in the league at 83 seconds. HP damage elite. NTK elite. M8 wins 29% of maps while getting outslayed — the highest rate in the league — and that is directly because of his OBJ play.",wk:"SND declining. Gets worse at LAN. Overall declining from his M1 peak.",dig:"M8\'s anchor and the reason they have the highest OBJ win rate in the league. They win through his hill time not through slaying. The regression shows his impact rating is the #1 predictor of HP winning — Ghosty\'s style of play is literally the most valuable thing you can do in Hardpoint. But he gets worse at LAN and SND is declining which limits M8\'s ceiling."},
{n:"Lurqxx",t:"CAR",o:83,ro:"HP-SLAYER | FLEX",kd:1.10,bpr:1.04,lan:0,fb:0,z:{bpr:.32,hp:1.32,hpD:1.24,hpE:1.3,snd:.37,ovl:.03,ntk:-.28},m2:{hpK:1.14,sndK:1.08,ovlK:1.02,hpDmg:3450,hpHill:62.1,hpEng:63.5,sndOd:.472,ovlG:8},m1:{bpr:.95,hpK:1.05,sndK:.75,ovlK:1.04},str:"HP elite — high damage with fast engagement pace. SND surged from 0.75 to 1.08. Positive in every mode which makes him a true system player.",wk:"SND opening duel rate is below average. OVL exactly average. No elite ceiling in any single category.",dig:"Carolina\'s engine. The team works because nobody collapses and Lurqxx is the best version of that philosophy — consistently above average everywhere. His surge from M1 to M2Q across every mode shows real development. Carolina is a playoff team because of how well their four players fit together not because any individual is a superstar."},
{n:"Kremp",t:"MIN",o:83,ro:"SND-AGGRESSOR | FLANKER",kd:.99,bpr:.98,lan:-.01,fb:0,z:{bpr:-.24,hp:-.17,hpD:.99,hpE:1.89,snd:.53,kpr:.92,ovl:-.63,ntk:-1.53},m2:{hpK:.99,sndK:1.11,ovlK:.94,hpDmg:3408,hpHill:54.1,hpEng:64.8,sndOd:.538,ovlG:8},m1:{bpr:1.02,hpK:1.09,sndK:1.13,ovlK:.96},str:"Second-fastest pace in the league. SND rate of fire is elite. Holds the single-map kill record at 54.",wk:"Worst clean-up rate in the CDL — opens fights and dies before finishing them. Declining. Went 0.29 SND against LAT.",dig:"Creates enormous pressure through pure pace. When his aggression works Minnesota has an identity. When it does not — like the 0.29 SND against LAT — they completely collapse. The clean-up issue is structural not fixable — it is just how he plays. His value is in disruption not efficiency."},
{n:"Skyz",t:"MIN",o:82,ro:"SNIPER | HP-HYBRID",kd:1.03,bpr:1.02,lan:-.16,fb:0,z:{bpr:.13,hp:1.02,snd:.9,ovl:-1.2,ntk:-.08},m2:{hpK:1.11,sndK:1.18,ovlK:.87,hpDmg:3341,hpHill:68.1,hpEng:61.0,sndOd:.542,ovlG:6},m1:{bpr:.96,hpK:.89,sndK:.86,ovlK:.87},str:"Biggest improvement story in the league. Found his sniper role and went from 0.86 to 1.18 SND. HP improved from 0.89 to 1.11.",wk:"OVL is the worst among starters. One-dimensional improvement — only got better in HP and SND, not OVL.",dig:"Left Texas in the offseason and found a new identity as Minnesota\'s sniper. The SND improvement from 0.86 to 1.18 is dramatic and it has given Minnesota a real SND structure they did not have before. OVL remains terrible which creates a mode vulnerability opponents can exploit."},
{n:"Neptune",t:"M8",o:80,ro:"PRESSURE-SMG | HIDDEN-IMPACT",kd:1.04,bpr:1.02,lan:-.07,fb:0,z:{bpr:.13,hp:.32,hpD:1.07,hpE:1.09,od:.42,kpr:.59,ovl:.27,ntk:.29},m2:{hpK:1.04,sndK:1.0,ovlK:1.05,hpDmg:3422,hpHill:48.9,hpEng:63.0,sndOd:.543,ovlG:4},m1:{bpr:1.11,hpK:1.11,sndK:1.15,ovlK:.94},str:"Creates space through high-tempo high-damage HP. Trade efficiency is elite. SND opening duel rate willing to fight. Single-map record of 5.50 KD.",wk:"SND fell from 1.15 to 1.00. Impact rating dipped from M1 peak.",dig:"M8\'s most valuable player. On a better team he would be an 85+ rated player. He creates the space in HP that allows Ghosty to anchor and he does it through volume — high engagement, high damage, willing to take tough fights. His 5.50 KD single-map record on Raid SND shows his ceiling is insane even if he does not reach it consistently."},
{n:"Estreal",t:"MIN",o:80,ro:"GLUE | HP-HYBRID",kd:1.04,bpr:1.02,lan:-.03,fb:0,z:{bpr:.13,hp:.22,hpH:.81,snd:.26,ovl:.27,ntk:1.09},m2:{hpK:1.03,sndK:1.06,ovlK:1.05,hpDmg:3111,hpHill:71.6,hpEng:58.8,sndOd:.522,ovlG:8},m1:{bpr:1.02,hpK:1.05,sndK:.98,ovlK:.95},str:"NTK is quietly excellent — finishes fights teammates start better than almost anyone. Every stat is between average and slightly above which makes him a pure glue player.",wk:"No elite skill in any mode. Cannot carry a single map.",dig:"The definition of a glue guy. He does not show up on highlight reels and he does not have a single stat that jumps off the page. But he never collapses either. His 0.71 against LAT was an anomaly not a pattern. Minnesota works because their four players fit together and Estreal is the connector piece."},
{n:"Exnid",t:"RYD",o:80,ro:"HP-SLAYER | SND-LIABILITY",kd:1.09,bpr:1.08,lan:.02,fb:0,z:{bpr:.7,hp:1.12,hpD:.84,snd:-1.01,od:-1.32,ovl:.76,ntk:-.32},m2:{hpK:1.12,sndK:.82,ovlK:1.11,hpDmg:3383,hpHill:56.5,hpEng:62.0,sndOd:.385,ovlG:8},m1:{bpr:.96,hpK:.98,sndK:.74,ovlK:1.03},str:"HP elite. Surged from 0.97 to 1.09 across the board. OVL above average.",wk:"SND is a real liability — opening duel win rate is among the worst starters. Gets worse at LAN.",dig:"Respawn specialist stuck in a team with SND problems. HP and OVL are both above average but his SND struggles combined with Cellium\'s SND collapse give Riyadh a 36% SND win rate. That is the ceiling cap for this team heading into LAN."},
{n:"Traixx",t:"MIA",o:80,ro:"ENTRY FRAGGER",kd:1.05,bpr:1.09,lan:0,fb:0,z:{bpr:.8,hp:.42,snd:.74,od:1.04,kpr:.92,ovl:.03,ntk:.12},m2:{hpK:1.05,sndK:1.15,ovlK:1.02,hpDmg:3310,hpHill:53.7,hpEng:61.1,sndOd:.60,ovlG:9},m1:{bpr:.95,hpK:.97,sndK:.97,ovlK:.94},str:"SND entry behind SupeR giving Miami the best 1-2 SND punch in the league. Every stat is positive — no weakness to exploit.",wk:"No elite mode. OVL exactly average. Does not create explosive individual performances.",dig:"Miami\'s emerging third weapon. First South American player in CDL history. Every stat being positive means opponents cannot game-plan around exploiting Traixx. His role is to be solid everywhere and let SupeR and RenKoR carry the ceiling plays. Signed Sept 2025."},
{n:"Exceed",t:"CAR",o:79,ro:"SNIPER | OBJ (#1 Goals)",kd:.97,bpr:.99,lan:0,fb:0,z:{bpr:-.15,hp:-.37,snd:1.17,od:.56,ovl:-.96,gl:2.45,ntk:.61},m2:{hpK:.97,sndK:1.23,ovlK:.90,hpDmg:3148,hpHill:70.9,hpEng:58.8,sndOd:.556,ovlG:17},m1:{bpr:1.02,hpK:.94,sndK:.97,ovlK:1.13},str:"Leads the entire league in OVL goals by a massive margin — 17 goals. SND surged to 1.23.",wk:"OVL KD is negative because he dies while scoring. HP below average.",dig:"The purest OBJ player in the league. He does not care about his KD — he scores goals and wins OVL maps through sheer objective aggression. 17 goals leads the league by a wide margin. SND transformation from 0.97 to 1.23 shows real development. Signed from Challengers in January 2026."},
{n:"Nero",t:"CAR",o:79,ro:"HP-SLAYER | SYSTEM",kd:1.0,bpr:.98,lan:.04,fb:0,z:{bpr:-.24,hp:.32,hpD:.42,hpH:.71,snd:-.38,ovl:-.38,ntk:-.6},m2:{hpK:1.04,sndK:.94,ovlK:.97,hpDmg:3313,hpHill:70.4,hpEng:58.9,sndOd:.524,ovlG:8},m1:{bpr:.96,hpK:1.02,sndK:1.03,ovlK:1.04},str:"HP hill time is solid. All stats near average. Holds the single-map hill time record at 165 seconds.",wk:"No elite skill anywhere. High variance — can go 0.70 or 1.14 in any given series.",dig:"Average everywhere which is exactly what Carolina needs. His 165-second hill time record shows he CAN anchor hard when called upon. Carolina works because nobody collapses and Nero embodies that philosophy. His 2.80 SND against MIA was variance not a trend."},
{n:"Nium",t:"LAT",o:79,ro:"OBJ-CARRIER | SND-ENTRY",kd:1.0,bpr:1.06,lan:0,fb:0,z:{bpr:.51,od:1.32,ovl:.68,gl:1.87,ntk:.69},m2:{hpK:.96,sndK:.97,ovlK:1.10,hpDmg:3088,hpHill:68.0,hpEng:57.8,sndOd:.625,ovlG:15},m1:null,str:"SND opening duel rate is elite — top 5 entry man. OVL goals third in the league. NTK solid.",wk:"HP is passive — KD and engagement pace both below average. Disappears in Hardpoint maps.",dig:"Pure specialist. Elite SND entry and OVL OBJ player who goes invisible in HP. LAT uses him as their entry plus OBJ carrier while Scrap anchors. Promoted from sub to starter in February after Kenny was dropped and immediately found his role."},
{n:"Envoy",t:"M8",o:57,ro:"DEAD FLANKER",kd:.90,bpr:.88,lan:0,fb:0,z:{bpr:-1.19,hp:-1.47,hpE:1.27,snd:-1.39,od:-2.55,kpr:-1.49,ovl:-1.53,ntk:-1.73},m2:{hpK:.86,sndK:.75,ovlK:.83,hpDmg:3041,hpHill:59.7,hpEng:63.4,sndOd:.273,ovlG:9},m1:{bpr:1.03,hpK:1.01,sndK:.93,ovlK:.87},str:"Fast pace — takes a lot of fights quickly. LAN slightly positive.",wk:"Worst SND opening duel rate in the league at 24%. HP KD is terrible despite high engagement — takes fights and loses them constantly. NTK worst in the league. Below 1.00 on every single map. Range of 0.77-0.90 with zero upside.",dig:"The stats here are brutal and there is no way to sugarcoat them. He takes more fights than almost anyone in HP but loses the vast majority of them. His SND opening duel rate at 24% means he loses 3 out of 4 first gunfights. Unlike aBeZy who has shown a 1.31 ceiling, Envoy\'s range is 0.77 to 0.90 with no outlier good performances. M8 should have replaced him weeks ago."},
{n:"MettalZ",t:"MIA",o:73,ro:"BELOW REPLACEMENT",kd:.91,bpr:.98,lan:.01,fb:0,z:{bpr:-.24,hp:-1.07,snd:-1.33,od:-.91,kpr:-1.38,ovl:-.38,ntk:-.08},m2:{hpK:.90,sndK:.76,ovlK:.97,hpDmg:3090,hpHill:58.9,hpEng:60.2,sndOd:.422,ovlG:9},m1:{bpr:.94,hpK:1.0,sndK:.92,ovlK:.89},str:"Impact rating is only slightly below average — hidden impact not terrible.",wk:"HP well below average. SND well below average. Put up 0.20 KD in a Game 5 against Carolina. Declining from 0.95 to 0.91.",dig:"Miami\'s confirmed weak link. The gap between SupeR and MettalZ tells the entire Miami story — when your best player is historically elite and your worst player drops 0.20 in an elimination SND, that is a team with a ceiling cap. Re-signed in November 2025. Miami\'s path to improvement runs directly through upgrading this spot."},
{n:"aBeZy",t:"LAT",o:73,ro:"??? (HIGH VARIANCE)",kd:1.01,bpr:1.07,lan:-.01,fb:0,z:{bpr:.61,hp:.52,hpD:-1.07,od:-.97,ovl:-.63,ntk:1.98},m2:{hpK:1.06,sndK:.93,ovlK:.94,hpDmg:3066,hpHill:62.3,hpEng:59.2,sndOd:.417,ovlG:6},m1:{bpr:1.01,hpK:1.08,sndK:1.05,ovlK:.96},str:"Best clean-up rate in the entire league — finishes teammates\' fights better than anyone. Impact rating is solid. Has shown a 1.31 ceiling which means upside exists.",wk:"HP damage output is among the lowest starters. SND opening duel rate is poor at 38%. OVL below average.",dig:"The most puzzling player in the CDL. Best NTK in the league means he secures team kills better than anyone but he creates almost no damage of his own and avoids SND opening duels. He has a 1.31 ceiling unlike Envoy who caps at 0.90 — the upside is there but it appears randomly. High variance not consistently bad. Signed with LAT Sept 2025."},
{n:"04",t:"FV",o:67,ro:"SND-PASSIVE | OVL-LIABILITY",kd:.91,bpr:.98,lan:-.08,fb:0,z:{bpr:-.24,hp:-.47,od:-1.21,ovl:-1.53,gl:1.01,ntk:.45},m2:{hpK:.96,sndK:.92,ovlK:.83,hpDmg:3100,hpHill:51.0,hpEng:62.0,sndOd:.395,ovlG:12},m1:{bpr:1.04,hpK:1.0,sndK:.92,ovlK:.92},str:"OVL goals are solid. NTK positive.",wk:"OVL KD is among the worst starters. SND opening duel rate at 28% is second worst behind Envoy. Declining from 0.97 to 0.91. Gets worse at LAN.",dig:"Scores OVL goals but dies doing it. 28% SND opening duel rate is terrible. Alluka is sitting on the FaZe bench and directly fixes this position — better OVL KD and better SND entry. This is one of the clearest upgrade opportunities in the league. Signed with FaZe Sept 2025."},
{n:"Snoopy",t:"BOS",o:68,ro:"BELOW REPLACEMENT",kd:.92,bpr:.90,lan:-.09,fb:0,z:{bpr:-1.0,hp:-1.37,hpD:-2.12,hpE:-1.03,snd:-.06,ntk:-1.73},m2:{hpK:.87,sndK:1.0,ovlK:.98,hpDmg:2891,hpHill:52.8,hpEng:58.2,sndOd:.50,ovlG:3},m1:{bpr:1.01,hpK:.96,sndK:.96,ovlK:1.25},str:"SND exactly average.",wk:"Lowest HP damage in the entire league at 2891 per 10 minutes. Creates no space for teammates. NTK is terrible. Fell from 1.03 to 0.92. OVL collapsed from 1.25 to 0.98.",dig:"Creates the least space in the CDL. His HP damage is so low that opponents essentially get free rotations because there is no pressure. OVL collapsed between stages. SND is average which is the only reason he is still on a roster. Replace."},
{n:"Craze",t:"CAR",o:69,ro:"PRESSURE-SMG | TEMPO",kd:1.0,bpr:1.0,lan:0,fb:0,z:{bpr:-.06,hp:.02,snd:-.16,kpr:.7,ovl:-.22,ntk:-.32},m2:{hpK:1.01,sndK:.98,ovlK:.99,hpDmg:3219,hpHill:48.6,hpEng:60.9,sndOd:.40,ovlG:5},m1:{bpr:.93,hpK:.88,sndK:1.09,ovlK:.83},str:"Surged +0.11 from M1 across the board. SND pace is fast showing willingness to fight.",wk:"SND opening duel rate is poor. Gets worse at LAN.",dig:"Perfectly average — which is exactly what Carolina needs. Do NOT replace. This roster works because of chemistry not individual talent. His surge from M1 shows real growth and Carolina\'s R11 80% proves their SND structure works regardless of individual stats. LAN -0.10 is the only concern."},
{n:"Insight",t:"TOR",o:74,ro:"OBJ-CARRIER | ANCHOR",kd:1.0,bpr:1.02,lan:.07,fb:0,z:{bpr:.13,hpE:-2.12,kpr:-1.6,ovl:.52,gl:1.3,ntk:.73},m2:{hpK:.97,sndK:.89,ovlK:1.08,hpDmg:3112,hpHill:58.4,hpEng:55.8,sndOd:.421,ovlG:13},m1:{bpr:.98,hpK:.99,sndK:.87,ovlK:1.0},str:"OVL goals second in the league. NTK solid. Slowest pace in the CDL by design — that is his job.",wk:"SND pace is among the lowest — invisible in SND rounds. Does not create individual plays.",dig:"Slowest player in the CDL but that is by design — he is a pure OBJ carrier. Goals second in the league proves his OBJ commitment. Do NOT replace. Toronto\'s problem is SND and CleanX not Insight. Gets better at LAN with a +0.07 adjustment. Reunited with CleanX from BO6."},
{n:"Gwinn",t:"VAN",o:75,ro:"HARD-ANCHOR",kd:.98,bpr:.92,lan:.01,fb:0,z:{bpr:-.81,hp:.62,hpD:1.03,hpH:1.52,od:.72,ovl:-1.53},m2:{hpK:1.07,sndK:1.05,ovlK:.83,hpDmg:3415,hpHill:80.3,hpEng:60.8,sndOd:.571,ovlG:5},m1:{bpr:.81,hpK:.90,sndK:.65,ovlK:.94},str:"Great anchor — 80.3 seconds hill time with elite HP damage. SND surged from 0.65 to 1.05 which is massive growth.",wk:"OVL is catastrophic — among the worst in the league. Creates space that nobody around him uses.",dig:"Great anchor stuck on a bad team. HP and SND are both above average now. OVL is where it falls apart — he simply cannot play that mode. Deserves better teammates. Came over from Carolina in the offseason."},
{n:"Mamba",t:"MIN",o:72,ro:"PRESSURE-SMG (weak)",kd:.92,bpr:.95,lan:0,fb:0,z:{bpr:-.53,hp:-.87,ovl:-.96,ntk:-1.37},m2:{hpK:.92,sndK:.98,ovlK:.90,hpDmg:3237,hpHill:51.2,hpEng:60.7,sndOd:.516,ovlG:8},m1:{bpr:.99,hpK:1.02,sndK:1.06,ovlK:.92},str:"SND opening duel rate shows willingness to fight.",wk:"HP well below average. OVL below average. Worst clean-up rate among starters. Declining from 1.00 to 0.92. His 1.56 against Vancouver was a mirage against a bad team.",dig:"Minnesota\'s weak link. Declining across the board with no sign of recovery. The clean-up rate issue means even when he gets the first shot he does not finish the kill. His best performances have all come against bottom-tier teams."},
{n:"Purj",t:"BOS",o:62,ro:"BELOW REPLACEMENT",kd:.91,bpr:.88,lan:-.08,fb:0,z:{bpr:-1.19,hp:-1.17,hpD:-1.35,snd:-1.23,od:.44,ntk:-1.29},m2:{hpK:.89,sndK:.78,ovlK:1.0,hpDmg:3019,hpHill:53.8,hpEng:59.1,sndOd:.545,ovlG:4},m1:{bpr:.90,hpK:.82,sndK:.80,ovlK:.87},str:"SND opening duel rate shows willingness to take fights. Improving from M1.",wk:"HP well below average. SND well below average. NTK terrible. Negative in almost every category.",dig:"Takes fights but loses them. Negative everywhere that matters. The OD% being positive means he has the right mentality but not the gunskill to back it up at this level. Replace."},
{n:"KiSMET",t:"RYD",o:78,ro:"FLEX | OBJ-ANCHOR",kd:1.04,bpr:1.06,lan:-.06,fb:0,z:{bpr:.51,hp:.22,hpH:1.31,snd:-.59,ovl:.35,gl:.72,ntk:.45},m2:{hpK:1.04,sndK:.89,ovlK:1.10,hpDmg:3307,hpHill:74.1,hpEng:60.8,sndOd:.46,ovlG:10},m1:{bpr:1.10,hpK:1.06,sndK:1.15,ovlK:1.03},str:"Solid anchor with good hill time. OVL goals contributor. Versatile flex who can fill multiple roles.",wk:"SND declining from 1.15 to 0.89. Not elite at anything. Gets slightly worse at LAN.",dig:"Riyadh\'s fourth man. Does a bit of everything but nothing at an elite level. Signed Oct 2025 after RYD missed out on Sib and Ghosty. His SND decline mirrors the team\'s structural problem in that mode. Reliable floor but limited ceiling."},
{n:"HyDra",t:"LAT",o:88,ro:"HP-SLAYER | ENTRY-SMG",kd:1.13,bpr:1.08,lan:.01,fb:0,z:{bpr:.7,hp:1.22,hpD:1.42,hpE:.54,snd:.53,od:.34,ovl:.68,ntk:-.08},m2:{hpK:1.16,sndK:1.09,ovlK:1.12,hpDmg:3397,hpHill:57.1,hpEng:60.8,sndOd:.52,ovlG:8},m1:{bpr:1.02,hpK:1.14,sndK:.98,ovlK:1.10},str:"HP elite with one of the most consistent output ranges in the league — never has a terrible series. SND improved from M1. LAN completely neutral.",wk:"No elite SND ceiling. NTK slightly below average.",dig:"LAT\'s second star and maybe the most consistent player in the CDL. His variance across BO6 was the smallest of any top player — you know exactly what you are getting. HP damage is elite. #2 on the BO6 Top 20 list and has maintained that level. LAN neutral means what you see online is what you get on stage."},
{n:"Drazah",t:"FV",o:79,ro:"AR | DECLINING FLEX",kd:1.01,bpr:.99,lan:-.05,fb:0,z:{bpr:-.15,hp:.12,snd:-.27,od:-.34,ovl:-.22,ntk:.29},m2:{hpK:1.03,sndK:.96,ovlK:1.00,hpDmg:3280,hpHill:59.2,hpEng:61.1,sndOd:.47,ovlG:9},m1:{bpr:1.07,hpK:1.10,sndK:1.06,ovlK:1.08},str:"Recovering from a brutal 0.83 Champs and 0.89 ESWC. Scar HP is his best map at 1.14. Den OVL at 1.11 shows mode-specific value.",wk:"SND cratered from M1. Gets worse at LAN. Declining from peak. Passive playstyle limits playmaking.",dig:"Was #17 on BO6 Top 20 but hit rock bottom at Champs and ESWC. Now recovering to 1.01 in BO7 but not the player he was. Re-signed with FaZe Sept 2025. His Scar SND at 0.69 is a liability in a mode where FaZe already struggles to close."},
{n:"CleanX",t:"TOR",o:76,ro:"PRESSURE-SMG | SUPPORT",kd:.98,bpr:.99,lan:-.05,fb:0,z:{bpr:-.15,hp:-.17,hpE:.54,snd:-.43,ovl:.11,ntk:.12},m2:{hpK:.97,sndK:.91,ovlK:1.02,hpDmg:3200,hpHill:55.8,hpEng:62.3,sndOd:.48,ovlG:7},m1:{bpr:1.03,hpK:1.05,sndK:.98,ovlK:.99},str:"OVL slightly positive. Engagement pace shows willingness to fight. Den OVL at 1.09 is a bright spot.",wk:"SND declining — was #14 on BO6 Top 20 but falling off in BO7. Exposure SND at 0.64 is his death map.",dig:"Reunited with Insight at Toronto in October 2025 but has not found his BO6 form. Was #14 on last year\'s Top 20. Toronto\'s SND problems are partly his responsibility. Exposure is unplayable for him. Shows up in OVL and spots in HP but the SND decline drags the team down in Game 2 and Game 5."},

// COMPUTE TRUE PERCENTILES — 100 = #1 in category (PURPLE)
// For each stat column, rank all players and assign 1-100
(function(){
const allC = P.map(p => {const c = CIR[p.n] || {}; return {...p, ...c}}).filter(x => x.cir != null);
const n = allC.length;
if(n < 2) return;

// For each stat, compute true percentile based on rank
const statKeys = ['hp','snd','ovl','cir','hp_kd','snd_kd','ovl_kd','bpr','kd'];
const pctKeys = ['p_hp_i','p_snd_i','p_ovl_i','p_cir','p_hp_kd','p_snd_kd','p_ovl_kd','p_bpr_t','p_kd_t'];

statKeys.forEach((sk, idx) => {
    // Get all values for this stat
    const vals = allC.map(p => ({n: p.n, v: p[sk] || 0})).sort((a,b) => b.v - a.v);
    vals.forEach((item, rank) => {
        // #1 gets 100, rest get scaled 1-99
        const pct = rank === 0 ? 100 : Math.max(1, Math.round(99 - (rank / (n-1)) * 98));
        // Store back into CIR
        if(CIR[item.n]) CIR[item.n]['tp_' + sk] = pct;
    });
});

// Also compute for z-score based stats
const zKeys = [['bpr','z_bpr'],['hp','z_hp'],['hpD','z_hpD'],['hpH','z_hpH'],['snd','z_snd'],['od','z_od'],['ovl','z_ovl'],['gl','z_gl'],['ntk','z_ntk']];
zKeys.forEach(([zk, label]) => {
    const vals = allC.map(p => ({n: p.n, v: p.z?.[zk] || 0})).sort((a,b) => b.v - a.v);
    vals.forEach((item, rank) => {
        const pct = rank === 0 ? 100 : Math.max(1, Math.round(99 - (rank / (n-1)) * 98));
        if(CIR[item.n]) CIR[item.n]['tp_z_' + zk] = pct;
    });
});
})();

    }

    document.getElementById("MC").innerHTML = h;
    document.getElementById("MD").classList.add("on");
}

<div style="display:grid;grid-template-columns:48px 1fr;gap:12px;margin-bottom:12px">
<div style="width:48px;height:48px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--grn);border:2px solid var(--grn);flex-shrink:0">4</div>
<div class="c" style="padding:14px 18px"><div style="font-weight:800;font-size:14px;color:var(--h);margin-bottom:4px">Combine Into One Number</div><p style="font-size:13px;color:var(--sub);line-height:1.7">CIR combines mode-specific impact scores (HP Impact, SND Impact, OVL Impact) into a single net rating. A positive CIR means you help your team win. A negative CIR means you hurt it. Like EPM in basketball or WAR in baseball — one number that captures total value.</p></div>
</div>

<div style="display:grid;grid-template-columns:48px 1fr;gap:12px;margin-bottom:20px">
<div style="width:48px;height:48px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--grn);border:2px solid var(--grn);flex-shrink:0">5</div>
<div class="c" style="padding:14px 18px"><div style="font-weight:800;font-size:14px;color:var(--h);margin-bottom:4px">Validate</div><p style="font-size:13px;color:var(--sub);line-height:1.7">We backtested our model against 131 matches across the entire BO7 season. It correctly predicts the series winner 70.2% of the time, which approaches the theoretical ceiling for a game with CoD's inherent variance.</p></div>
</div>

<div class="sec">What We Discovered</div>

<div class="c" style="padding:18px 20px;border-left:3px solid var(--grn);margin-bottom:8px">
<div style="font-weight:800;font-size:15px;color:var(--h);margin-bottom:6px">Some Stats Are Far More Predictive Than Others</div>
<p style="font-size:13px;color:var(--sub);line-height:1.8">The stat most analysts consider secondary turned out to be the strongest predictor of Hardpoint and Overload winning — significantly more predictive than K/D. Meanwhile, certain stats that are treated as critical (like SND Opening Duel %) turned out to predict almost nothing about team SND outcomes.</p>
</div>

<div class="c" style="padding:18px 20px;border-left:3px solid #fbbf24;margin-bottom:8px">
<div style="font-weight:800;font-size:15px;color:var(--h);margin-bottom:6px">SND Cannot Be Predicted From Individual Stats</div>
<p style="font-size:13px;color:var(--sub);line-height:1.8">This was the biggest surprise. No individual stat — not K/D, not first blood rate, not kills per round — predicts SND team winning well. SND success is driven by comms, rotations, and team execution. This is why Cloud9 has an above-average SND win rate but is 3-16 overall. You cannot scout SND from a spreadsheet.</p>
</div>

<div class="c" style="padding:18px 20px;border-left:3px solid var(--red);margin-bottom:8px">
<div style="font-weight:800;font-size:15px;color:var(--h);margin-bottom:6px">Pace Does Not Equal Impact</div>
<p style="font-size:13px;color:var(--sub);line-height:1.8">Engagement rate — how many fights a player takes — turned out to be essentially random as a predictor of winning. Taking a lot of fights does not help your team if you lose those fights. Some of the highest-engagement players in the league have the worst impact ratings.</p>
</div>

<div class="c" style="padding:18px 20px;border-left:3px solid var(--acc);margin-bottom:8px">
<div style="font-weight:800;font-size:15px;color:var(--h);margin-bottom:6px">CoD Is a Weak Link Game</div>
<p style="font-size:13px;color:var(--sub);line-height:1.8">A team's worst player predicts over 80% of their win rate. Their best player predicts just over 60%. The talent gap between your best and worst player is statistically irrelevant. This means having a superstar matters less than having no liabilities. It is why the team with the highest-rated player in the league is not the best team — but the team with the highest floor is.</p>
</div>

<div class="sec">Data & Attribution</div>
<p style="font-size:13px;color:var(--sub);line-height:1.8;margin-bottom:8px">All raw statistics are sourced from <strong style="color:var(--h)">BreakingPoint.gg</strong>, the most comprehensive CDL stats platform. We are grateful for their work in collecting and maintaining this data.</p>
<p style="font-size:13px;color:var(--sub);line-height:1.8">CIR ratings, regression methodology, player scout reports, weak link analysis, strength of schedule adjustments, archetype classifications, and all analytical interpretation are original to <strong style="color:var(--h)">CDL War Room</strong>.</p>

</div>`}

// ═══ GLOSSARY ═══
function rGloss(){
const stats = [
["CIR (CDL Impact Rating)","CDL War Room Original","A single number measuring a player's net contribution to winning, like EPM in basketball. Combines HP Impact, SND Impact, and OVL Impact using regression-backed weights. Positive CIR means you help your team win. Negative means you hurt it. Range is roughly +4 to -4. The 100th percentile (purple) means you are #1 in the league at that stat."],
["HP Impact","CDL War Room Original","A player's estimated contribution to Hardpoint winning specifically. Built from BPR, HP KD, NTK, HP Damage, and Hill Time weighted by how much each stat actually predicts HP outcomes."],
["SND Impact","CDL War Room Original","A player's estimated contribution to SND winning. The weakest of the three mode impacts because SND is largely unpredictable from individual stats."],
["OVL Impact","CDL War Room Original","A player's estimated contribution to Overload winning. Built from BPR, OVL KD, Goals, and NTK."],
["Floor / Ceiling","CDL War Room Original","Floor is the OVR rating of a team's worst player. Ceiling is their best player. We found that Floor explains 81.6% of team winning while Ceiling explains 62.2%. A team's floor matters more than its ceiling."],
["SOS (Strength of Schedule)","CDL War Room Original","Average win percentage of a team's opponents, weighted by games played. Shows whether a team's record was built against good competition or weak opponents."],
["Percentile (1-100)","CDL War Room Original","Where a player ranks among all CDL starters for a given stat. 50th means league average. 90th means top 5 in the league. 100th (shown in purple) means #1 in the entire league for that stat."],
["BPR (BreakingPoint Rating)","BreakingPoint.gg","A proprietary impact metric from BreakingPoint.gg that captures hidden contributions beyond kills and deaths — trades, map control, positioning. Our analysis found BPR is the single strongest predictor of both HP and OVL winning — significantly more predictive than raw K/D."],
["K/D (Kill/Death Ratio)","Standard","Kills divided by deaths. The most commonly cited stat in CoD. Useful but incomplete — it does not capture objective play, trades, or positioning. A player can have a 1.00 KD but a 1.15 BPR because they make winning plays that do not show up in the killfeed."],
["NTK (Non-Traded Kill %)","BreakingPoint.gg","The percentage of a player's kills that are not immediately traded back by the opponent. High NTK means you get kills that stick — the enemy stays dead and your team gets the numbers advantage. Low NTK means your kills get traded instantly."],
["HP KD","Standard","Kill/Death ratio in Hardpoint specifically. A strong predictor of HP winning, but our analysis found it is less predictive than BPR for team outcomes."],
["HP DMG/10m","Standard","Damage dealt per 10 minutes in Hardpoint. Measures how much space a player creates through damage output. Scrap leads the league at roughly 3700 per 10 minutes."],
["HP Hill Time/10m","Standard","Seconds spent on the Hardpoint hill per 10 minutes. Measures objective commitment. Cellium leads at 94.5 seconds. High hill time usually means lower K/D because you absorb deaths while anchoring."],
["SND KD","Standard","Kill/Death ratio in Search & Destroy. Predicts 22.6% of SND team winning — less predictive than most analysts assume."],
["SND OD% (Opening Duel Win %)","BreakingPoint.gg","Percentage of first gunfights won in SND rounds. SupeR leads at roughly 71%. Our analysis found this stat is far less predictive of SND team winning than conventional wisdom suggests — one of our most surprising findings."],
["SND KpR (Kills Per Round)","Standard","Average kills per SND round. Measures SND pace and aggression."],
["OVL KD","Standard","Kill/Death ratio in Overload. Predicts 39.9% of OVL team winning."],
["OVL Goals/10m","Standard","Objective goals scored per 10 minutes in Overload. Exceed leads the league. Measures pure OBJ commitment."],
["TES (Trade Efficiency Score)","BreakingPoint.gg","Measures how efficiently a player trades kills with teammates. Our analysis identified TES as one of the most undervalued stats in the CDL — it predicts winning far better than most commonly cited metrics."],
["LAN Adjustment","CDL War Room Original","The average change in a player's KD between online matches and LAN events, calculated across 6 BO6 LAN tournaments. Positive means the player gets better on stage. Negative means they get worse. Shotzzy is +0.11 (gets better). Scrap is -0.02 (stays the same). Huke is -0.08 (gets worse)."],
["Archetype","CDL War Room Original","A descriptive label for how a player actually plays, based on their statistical profile across all modes. Examples: 'Opening Playmaker' (SupeR — wins first fights), 'Damage Engine' (Scrap — highest HP damage output), 'OBJ Specialist' (Ghosty — wins through hill time not kills), 'Pace Without Purpose' (Envoy — high engagement, loses most fights)."]
];
return `
<div style="max-width:720px;margin:0 auto;padding:20px 0">
<div style="font-size:32px;font-weight:900;color:var(--h);margin-bottom:6px">Stat Glossary</div>

<span class="bg" style="color:${source==="CDL War Room Original"?"var(--grn)":source==="BreakingPoint.gg"?"var(--acc)":"var(--sub)"};background:${source==="CDL War Room Original"?"rgba(16,185,129,.1)":source==="BreakingPoint.gg"?"rgba(96,165,250,.1)":"var(--s3)"};flex-shrink:0">${source}</span>
