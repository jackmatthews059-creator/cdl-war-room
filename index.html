<title>CDL War Room</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111318;--s1:#181b22;--s2:#1e222b;--s3:#262b36;--s4:#2f3544;--bd:#2f3544;--bd2:#3d4556;--h:#f0f2f5;--tx:#c8cdd8;--sub:#8b93a5;--cap:#5e667a;--grn:#10b981;--grn2:#065f46;--grn3:#022c22;--red:#f87171;--red2:#991b1b;--acc:#60a5fa;--mono:'JetBrains Mono',monospace;--sans:Inter,system-ui,sans-serif}

.w{max-width:1160px;margin:0 auto;padding:0 20px 80px}

.tb button:hover{color:var(--tx)}.tb button.on{color:var(--h);border-bottom-color:var(--grn)}

{n:"SupeR",t:"MIA",o:92,ro:"OPENING PLAYMAKER",kd:1.15,bpr:1.1,lan:-0.13,fb:20.8,m2:{hpK:1.09,sndK:1.38,ovlK:1.16,hpDmg:3079,hpHill:58.1,sndOd:0.757,ovlG:0.91,str:"Best SND player in the CDL with a 1.38 KD. First blood rate warps how opponents play. Miami wins SND while outslayed 60 percent of the time. Season VMP of plus 6.0 is highest in the league by over a point.",wk:"HP pace slower than ideal. BO6 LAN data shows minus 0.130 raw adjustment that shrinks to minus 0.042 after sample-size correction. The online to LAN SND gap is real.",dig:"SupeR is the CDL equivalent of a pitcher with a 97 mph fastball. When the velocity is there nobody can touch him. Tonight he went 1.34 overall with a 2.00 SND KD. His VMP of plus 6.0 is the highest in the league. If he shows up at LAN like he did tonight Miami is a Finals contender. If the LAN nerf kicks in they are a first round exit."},str:"Best SND player in the league. Wins 1 in 5 opening gunfights. MIA wins SND while outslayed 60% of the time. Season 1.38 SND KD is absurd.",wk:"Slower HP pace than ideal. Recent cold streak to 0.93. LAN -0.13 concern.",dig:"SupeR is the CDL equivalent of a pitcher with a 97 mph fastball. When the velocity is there nobody can touch him. Tonight he went 1.34 overall with a 2.00 SND KD including 12 kills on 6 deaths in Exposure SND. His VMP of plus 5.9 is the highest in the league by over a full point. If he shows up at LAN like he did tonight Miami is a legitimate Finals contender. If the LAN nerf kicks in they are a first round exit."},
{n:"Mercules",t:"TX",o:96,ro:"LURK ASSASSIN",kd:1.12,bpr:1.18,lan:-0.1,fb:10.8,m2:{hpK:1.06,sndK:1.53,ovlK:1.1,hpDmg:3348,hpHill:68.9,sndOd:0.491,ovlG:1.16,str:"Highest BPR in the league at 1.20. Lurk and trade style generates massive hidden value. SND KD 1.53 through positioning not gunfights. Positive in every mode across every split.",wk:"Rarely takes first fight. HP KD functional not dominant. Raw LAN adjustment of minus 0.103 shrinks to minus 0.028 after sample-size correction for 3 LAN sample. High online peak means some regression is expected regardless.",dig:"Mercules is the glue that makes Texas work. His VMP of plus 4.8 ranks second overall but the way he generates value is completely unique. While most high VMP players are fraggers Mercules creates impact through lurks trades and rotations. His 1.80 KD in Raid SND tonight showed the ceiling. The LAN concern is real but small sample and the lurk style should translate."},str:"Highest BPR in the league (1.20 season). SND KD 1.53 through lurk/trade style. Positive on every map in every mode.",wk:"Rarely takes first fight. HP KD functional not dominant. LAN -0.10.",dig:"Mercules is the glue that makes Texas work. His VMP of plus 4.4 ranks second overall but the way he generates that value is completely unique. While most high VMP players are fraggers Mercules creates impact through lurks trades and rotations. He is the reason Texas closes out tight SNDs and his 1.80 KD in Raid SND tonight showed the ceiling. The LAN nerf is the only concern but the Texas system may insulate him."},
{n:"Abuzah",t:"FV",o:92,ro:"DUAL-THREAT ANCHOR",kd:1.1,bpr:1.1,lan:-0.02,m2:{hpK:1.03,sndK:1.4,ovlK:1.11,hpDmg:3304,hpHill:85.7,sndOd:0.661,ovlG:1.21,str:"Elite SND entry at 66 percent opening duel rate. Also anchors HP at 85.7 seconds hill time. SND VMP of plus 6.9 is absurd. VMP rose from plus 2.6 to plus 3.4 with corrected mode weights because SND matters more.",wk:"HP KD 1.03 is below his anchor peers because he absorbs deaths on hill. FaZe R11 rate of 29 percent despite his individual SND excellence. Overloaded with entry and anchor duties.",dig:"FaZe lives and dies with Abuzah. His BO6 SND KD was 0.88 and he has completely transformed that to 1.40 in BO7 which is one of the biggest year over year improvements in CDL history. The concern is that FaZe 29 percent R11 rate means his individual brilliance is not translating to team clutch situations."},str:"Elite SND entry at 66% OD%. Also anchors HP at 85.7s hill time. LAN neutral.",wk:"HP KD negative because he absorbs deaths on hill. Overloaded with 3 roles. FV 29% R11 despite his SND.",dig:"FaZe lives and dies with Abuzah. SND entry AND HP anchor in one player which is unsustainable. FV 29% R11 means his individual brilliance is not translating to team clutch."},
{n:"Cellium",t:"RYD",o:86,ro:"HP/OVL ANCHOR",kd:1.13,bpr:1.07,lan:-0.04,m2:{hpK:1.13,sndK:1.0,ovlK:1.17,hpDmg:3212,hpHill:83.6,sndOd:0.556,ovlG:0.88,str:"Best anchor in the CDL. 83.6 seconds hill time. OVL KD 1.17 elite. NTK percentage highest in the league. HP VMP of plus 5.4 is the single highest mode specific rating.",wk:"SND has completely collapsed to 0.65 M2Q KD. With SND now weighted at 35 percent his overall VMP dropped from plus 3.2 to plus 2.0. RYD SND win rate of 30.8 percent. LAN adjustment minus 0.017 after correction.",dig:"Cellium presents the most extreme statistical profile in the CDL. His HP VMP is the highest in the league. His SND is essentially average. This means Riyadh needs to win in four maps or less because every Game 5 SND is a liability. Until the SND problem is solved Riyadh has a hard ceiling."},str:"Best anchor in CoD. 83.6s hill time. OVL 1.17 KD elite. NTK highest in league. Season HP 1.13 confirmed.",wk:"SND collapsed  -  season 1.00 masks the M2Q 0.65. RYD 36% SND because of him and Exnid.",dig:"Cellium presents the most extreme statistical profile in the CDL. His HP VMP of plus 5.4 is the highest in the league. His SND VMP is plus 0.2 which is essentially average. This means Riyadh needs to win in four maps or less because every Game 5 SND is a liability. Tonight against Vancouver he proved both sides of this coin: he was the best player in the lobby in Map 4 HP going 2.33 and invisible in Map 5 SND going 0.43. Until the SND problem is solved Riyadh has a hard ceiling at Major 2."},
{n:"Kips",t:"TOR",o:87,ro:"THREE-ROLE CARRY",kd:1.07,bpr:1.14,m2:{hpK:1.05,sndK:1.3,ovlK:1.04,hpDmg:3625,hpHill:74.2,sndOd:0.571,ovlG:0.75,dig:"Everything on Toronto runs through Kips. He covers three roles which is both his superpower and ceiling. Tonight against Texas he went 0.84 overall showing what happens when the three role burden catches up. But his 1.31 HP KD in Map 1 proves the talent is elite.",str:"Second highest HP damage in CDL at 3625. SND 1.30 elite. Covers sniper entry and anchor alone. Season VMP plus 2.9.",wk:"OVL average. Three role fatigue risk in long series. Small sample of 8 series in season data. No M1 data."},str:"Second-highest HP damage in CDL (3625). SND 1.30 elite. Covers sniper, entry, anchor alone.",wk:"OVL average. Three-role fatigue risk in long series. Only 8 series sample.",dig:"Everything runs through Kips. Toronto is a playoff team because of him. Covers three roles which is both superpower and risk."},
{n:"Ghosty",t:"M8",o:86,ro:"OBJ ANCHOR",kd:1.07,bpr:1.08,lan:-0.04,m2:{hpK:1.12,sndK:1.05,ovlK:1.0,hpDmg:3316,hpHill:92.3,sndOd:0.467,ovlG:0.88,str:"Third best hill holder at 83 seconds. M8 wins 29 percent of maps while outslayed because of his OBJ. HP VMP of plus 5.9 highest in the league.",wk:"SND declined in M2Q. OVR dropped from 93 to 85 across majors. LAN adjustment minus 0.014. Tonight 0.43 Map 1 HP.",dig:"Ghosty is the anchor keeping M8 competitive despite the Envoy problem. His HP VMP of plus 5.9 is the highest in the league even above Cellium. But the M8 losing trend means his individual excellence is being wasted. If M8 makes a roster move Ghosty plus Sib plus Neptune is a core that can compete."},str:"Third-best hill holder (83s). M8 wins 29% of maps while outslayed  -  highest in CDL  -  because of his OBJ play. NTK elite.",wk:"SND declining. LAN -0.04. Tonight went 0.43 HP KD in Map 1 vs LAT.",dig:"Ghosty is the anchor keeping M8 competitive despite the Envoy problem. His HP VMP of plus 5.9 is actually the highest in the league even above Cellium. But the M8 losing trend means his individual excellence is being wasted. He cannot hold the hill and carry SND and cover for Envoy all at once. Tonight he went 0.43 in Map 1 HP but recovered to 1.33 in Map 4 showing the resilience is still there. If M8 makes a roster move Ghosty plus Sib plus Neptune is a core that can compete with anyone in the league."},
{n:"JoeDec",t:"TOR",o:83,ro:"OVL CLOSER",kd:1.13,bpr:1.08,lan:0.11,m2:{hpK:1.09,sndK:1.07,ovlK:1.23,hpDmg:3454,hpHill:55.3,sndOd:0.559,ovlG:1.00,str:"OVL KD 1.23 elite. Gets better at LAN with biggest buff in CDL at plus 0.045 after sample-size correction. NTK strong.",wk:"SND cratered from 1.26 M1 to 0.90 M2Q. OVR dropped from 95 to 81. Lost SND identity.",dig:"Toronto OVL star and LAN wild card. His plus 0.045 LAN buff is the largest in the CDL even after correction. On Den he is the best player in the league. The SND collapse hurts Game 5 chances but if TOR can avoid Game 5 SND JoeDec elevates on stage."},str:"OVL 1.23 KD elite. Season 1.13 KD. Gets better at LAN (+0.11). NTK strong.",wk:"SND cratered from 1.07 season to 0.90 in M2Q. Lost SND identity.",dig:"Toronto OVL star and LAN wild card. +0.11 LAN buff is biggest in CDL. On Den he is the best player in the league. SND collapse hurts Game 5 chances."},
{n:"Spart",t:"BOS",o:84,ro:"CARRY | ALL-MODE",kd:1.1,bpr:1.03,m2:{hpK:1.04,sndK:1.21,ovlK:1.18,hpDmg:3338,hpHill:75.8,sndOd:0.667,ovlG:0.65,str:"Positive every mode with 1.10 season KD. SND OD 66.7 percent elite entry. VMP plus 2.7.",wk:"On a 6 and 14 team that is eliminated from Birmingham. BPR 1.03 despite strong KD proves team contamination.",dig:"The most wasted talent in the CDL. On Texas or Miami he would be a franchise player. BOS outslays and still loses. His BPR of 1.03 despite strong individual stats is the clearest evidence of team contamination in the data."},str:"Positive every mode. SND OD% 66.7% elite entry. Season 1.10 KD, 1.21 SND.",wk:"On a 3-8 team. BPR 1.03 despite strong KD = team dragging him down.",dig:"The most wasted talent in the CDL. Spart is positive in every mode with a 1.10 season KD and his SND entry rate of 66.7 percent OD is elite. On Texas or Miami he would be a franchise-level player and a serious MVP candidate. Instead he is on a Boston team that is 6 and 14 and going nowhere. His BPR of 1.03 despite strong individual stats is the clearest evidence of team contamination in the data: even great players look worse when their team loses."},
{n:"Simp",t:"FV",o:86,ro:"HP DAMAGE ENGINE",kd:1.12,bpr:1.11,lan:0.02,m2:{hpK:1.12,sndK:1.2,ovlK:1.08,hpDmg:3448,hpHill:64.2,sndOd:0.545,ovlG:0.92,dig:"Simp was the best player in the CDL during Major 1 with a VMP of plus 4.5 and he has declined to plus 2.8 in M2Q. His HP damage of 3507 per 10 is still top 3 in the league but his OVL KD dropped from 1.17 in M1 to 0.97 in M2Q. The question is whether this is regression or if the meta shifted away from his style. FaZe overall declining trajectory from plus 2.4 team VMP to plus 0.7 suggests this might be systemic rather than individual. At LAN Simp historically shows up and a return to M1 form would make FaZe a dark horse.",str:"HP damage 3507 top 3 in CDL. Season HP KD 1.12. SND 1.20 solid across the year. BO6 champion pedigree.",wk:"OVL dipped below 1.00 in M2Q. VMP fell from plus 4.5 M1 to plus 1.7 M2. FaZe R11 rate of 29 percent despite his SND."},str:"HP DMG 3448 top 3 in CDL. Season 1.12 HP KD. SND 1.20 solid.",wk:"OVL 0.97-1.08 range, below average. Declining from M1 peak.",dig:"Highest HP damage output in the league alongside Scrap. Was elite everywhere in M1 but now only elite in HP. LAN neutral  -  bounce-back ability is there."},
{n:"Scrap",t:"LAT",o:82,ro:"DAMAGE ENGINE",kd:1.08,bpr:1.07,lan:-0.02,m2:{hpK:1.11,sndK:1.02,ovlK:1.04,hpDmg:3696,hpHill:64.4,sndOd:0.571,ovlG:1.49,str:"Highest HP damage in the CDL at 3696 per 10 minutes. M2Q VMP rose from minus 0.6 in M1 to plus 3.8 in M2. OVR went from 72 to 96 across majors. BO6 number 1 player carries over.",wk:"SND VMP of plus 0.9 is just average. Tonight went 0.59 in Map 4 HP for worst individual map. LAN adjustment is essentially neutral at minus 0.006 after correction.",dig:"Scrap is the engine that makes LA Thieves competitive. His 3700 HP damage is so far above league average that it warps how opponents rotate. The M1 to M2 transformation from 72 OVR to 96 OVR is the biggest individual jump in the league. His LAN neutrality is a huge asset for Birmingham."},str:"Season HP DMG 3696 highest in CDL by far. Fastest anchor. OVL goals top 3.",wk:"SND exactly average. LAN -0.02. Tonight had worst series (0.90)  -  went 0.59 in Map 4 HP.",dig:"Scrap is the engine that makes LA Thieves competitive. His 3700 HP damage per 10 is so far above the league average that it single handedly keeps LAT in Hardpoint maps they have no business winning. The M1 to M2 transformation has been remarkable with his VMP rising nearly 4.5 points. Tonight against M8 he had a poor Map 4 but still dropped a 2.40 SND KD in Map 2. The concern is consistency at LAN and whether his SND average holds against better competition."},
{n:"RenKoR",t:"MIA",o:82,ro:"FLEX | COMPLETE",kd:1.16,bpr:1.08,lan:0.02,m2:{hpK:1.22,sndK:1.05,ovlK:1.11,hpDmg:3359,hpHill:62.1,sndOd:0.500,ovlG:0.76,dig:"Miami most complete player. Tonight 1.20 series with a 1.39 OVL in Map 3. Steadiest hand on the roster. His BO6 All Star selection validates the consistency across titles.",str:"Season 1.16 KD positive in every mode. Most complete player in the CDL. SND surged to 1.21. BO6 All Star first team. LAN adjustment neutral at plus 0.008.",wk:"No elite ceiling in any single mode. HP dipped from M1 peak. Cannot carry a series alone the way SupeR can."},str:"Season 1.16 KD, positive every mode. SND surged to 1.21. LAN +0.02.",wk:"No elite ceiling in any single mode. HP dipped from M1.",dig:"Miami most complete player. Tonight 1.20 series with a 1.39 OVL in Map 3. Steadiest hand on the roster."},
{n:"Nium",t:"LAT",o:77,ro:"OBJ CARRIER",kd:1.0,bpr:1.06,m2:{hpK:0.96,sndK:0.97,ovlK:1.1,hpDmg:3088,hpHill:68.0,sndOd:0.625,ovlG:1.55,dig:"Nium OVL VMP of plus 4.3 is the second highest in the league behind only SupeR total VMP. He is a pure OVL closer and the reason LAT wins 63.6 percent of their Overload maps. His HP is average and his SND is slightly below but on a team with Scrap handling HP and aBeZy handling entries Nium just needs to show up in OVL. Tonight he went 1.53 in Map 1 HP and 2.33 in Game 5 SND showing his ceiling is higher than his season numbers suggest.",str:"OVL VMP of plus 4.3 second in the league. Transformed LAT when he arrived. OBJ presence fills the exact role LAT was missing. Strong SND OD percentage.",wk:"HP KD of 0.96 means he absorbs deaths without enough hill time. Small sample size risk with only 10 series. Unproven at LAN."},dig:"Nium transformed LA Thieves when he arrived in M2Q. His OVL VMP of plus 4.3 is second only to SupeR and he immediately became the OBJ presence LAT was missing. His 0.96 M1 proxy versus his M2Q 1.10 OVL KD shows the impact of joining a structured roster. The concern is his HP KD of 0.96 which means he absorbs deaths like an anchor without the hill time to justify it. At LAN his role will be to win OVL maps and stay out of the way in HP."},
{n:"Exceed",t:"CAR",o:80,ro:"OBJ CARRIER",kd:0.99,bpr:1.0,m2:{hpK:0.96,sndK:1.13,ovlK:0.99,hpDmg:3095,hpHill:75.6,sndOd:0.535,ovlG:1.74,str:"OVL VMP plus 2.9 top tier. Rose from minus 0.5 M1 to plus 1.3 M2.",wk:"HP KD 0.97 below average. Carolina ceiling depends on his OVL.",dig:"Exceed OVL emergence has been key to Carolina being competitive. His M1 to M2 rise mirrors the team trajectory. At Birmingham in the play-in his OVL will be critical."},dig:"The most improved player from M1 to M2. Exceed went from minus 0.5 VMP in M1 to plus 1.3 in M2Q driven by a surge in SND and OVL. His OVL VMP of plus 2.9 is top 10 in the league. Carolina R11 win rate of 80 percent is partly because of Exceed showing up in close SNDs. He is the kind of role player that makes Carolina more dangerous than their overall talent suggests."},
{n:"Dashy",t:"TX",o:80,ro:"ANCHOR | SNIPER",kd:1.0,bpr:1.09,lan:-0.04,m2:{hpK:0.98,sndK:1.03,ovlK:1.03,hpDmg:3294,hpHill:84.1,sndOd:0.508,ovlG:0.94,str:"85.7 seconds hill time second in the league. BPR 1.09 elite OBJ. Tonight 1.39 KD MVP in all three maps against Toronto.",wk:"HP KD 0.95 because he absorbs deaths on hill. Slowest tempo on TX. LAN adjustment minus 0.015 after correction.",dig:"Tonight was the Dashy game. He went 1.24 HP then 2.50 SND then 1.33 OVL to sweep Toronto. His 85.7 seconds hill time is second in the league. The M2Q has been his best split and this form at LAN makes Texas dangerous."},str:"Hill Time 85.7s season #2. BPR 1.09. OVL improved to 1.10.",wk:"HP KD 0.95  -  dies on hill. Slowest tempo on TX.",dig:"Tonight was the Dashy game. He went 1.24 in Den HP and 2.50 in Raid SND with 10 kills on 4 deaths and 1.33 in Scar OVL to sweep Toronto. His VMP of plus 2.2 reflects the anchor role perfectly: he is not the flashiest player but he creates the structure that lets Shotzzy and Huke slay. His 85.7 seconds of hill time is second in the league. The M2Q has been his best split and if this form carries to LAN he could be the difference between Texas winning Major 2 and losing in the semifinals."},
{n:"Pred",t:"RYD",o:80,ro:"SPACE CREATOR",kd:1.09,bpr:1.07,lan:0.09,m2:{hpK:1.04,sndK:1.17,ovlK:1.18,hpDmg:3159,hpHill:43.7,sndOd:0.478,ovlG:0.63,dig:"Riyadh emerging second star and the player most likely to carry them through a close match at Birmingham. His LAN buff of plus 0.029 makes him more dangerous on stage.",str:"OVL elite. Positive every category. LAN adjustment plus 0.029 after correction. M1 OVR 87.",wk:"SND dipped from 1.26 M1 to 1.08 M2Q. Slight overall decline."},str:"OVL elite. Positive every category. LAN +0.09 buff.",wk:"SND dipped from 1.26 to 1.08. Gets slightly worse at LAN on SND.",dig:"Riyadh emerging second star. Tonight went 0.92 overall but had 1.25 in Game 2 SND. His 1.26 vs TX showed his ceiling."},
{n:"Shotzzy",t:"TX",o:80,ro:"ENTRY FRAGGER",kd:1.03,bpr:1.12,lan:0.11,m2:{hpK:0.96,sndK:1.19,ovlK:1.09,hpDmg:3057,hpHill:57.5,sndOd:0.543,ovlG:0.76,dig:"The M2Q transformation of Shotzzy SND game is the single biggest individual improvement this split. Combined with Mercules lurk style Texas now has two elite SND players. His OVR jump from 82 to 93 reflects the real improvement.",str:"SND transformed from 1.06 M1 to 1.33 M2Q. BPR 1.12. OVR jumped from 82 to 93 across majors.",wk:"HP damage lowest on TX. BO6 LAN shows minus 0.070 raw that shrinks to minus 0.028 after correction. Cannot carry HP alone."},str:"SND 1.19-1.33 surging. BPR 1.12. LAN historically better.",wk:"HP damage lowest on TX. Cannot carry HP alone.",dig:"The M2Q transformation. Went from average SND to the league best entry. LAN history shows he elevates on stage."},
{n:"Nastie",t:"BOS",o:76,ro:"OBJ CARRIER",kd:1.05,bpr:0.99,m2:{hpK:1.0,sndK:0.96,ovlK:1.2,hpDmg:3117,hpHill:61.7,sndOd:0.467,ovlG:0.92,str:"OVL VMP plus 3.3 elite. Season 1.05 KD all mode positive. LAN plus 0.016.",wk:"SND VMP minus 1.7. On 6 and 14 team eliminated from Birmingham.",dig:"Nastie carries Boston in Overload. His OVL VMP is elite. But on a team this bad individual production cannot translate to wins. Eliminated from Birmingham."},dig:"Nastie is a player trapped on the wrong team. His OVL VMP of plus 3.3 is elite and he was the only positive Boston player in Map 3 OVL tonight going 1.20. His SND VMP of minus 1.7 is the drag. On a better roster his OVL production would be championship caliber but Boston 27.8 percent HP win rate means he spends most of his time in a mode his team cannot compete in."},
{n:"Drazah",t:"FV",o:75,ro:"OBJ CARRIER",kd:1.02,bpr:1.04,m2:{hpK:1.02,sndK:0.93,ovlK:1.05,hpDmg:3179,hpHill:59.1,sndOd:0.470,ovlG:1.09,str:"Positive HP and OVL. Season 1.02 KD consistent.",wk:"SND VMP minus 2.0. VMP fell from plus 1.7 M1 to minus 0.3 M2. LAN minus 0.020. Declining.",dig:"Drazah declining trajectory from M1 to M2 is a concern for FaZe at Birmingham. His BO6 LAN adjustment FLIPPED from plus 0.17 to minus 0.050 which was one of the biggest corrections in the BO6 data."},dig:"Drazah profile is the inverse of what FaZe needs. His OVL VMP of plus 2.2 is strong and his HP VMP of plus 1.1 is solid but his SND VMP of minus 2.0 is a serious liability. FaZe SND win rate of 57.1 percent is decent but Drazah is pulling it down. The M1 to M2 decline from plus 1.7 VMP to minus 0.3 suggests the meta has moved away from his style."},
{n:"Estreal",t:"MIN",o:78,ro:"OBJ CARRIER",kd:1.02,bpr:1.02,m2:{hpK:1.04,sndK:1.02,ovlK:1.0,hpDmg:3164,hpHill:69.5,sndOd:0.500,ovlG:0.71,str:"Most consistent Minnesota player. Positive VMP every mode. HP KD 1.05 with 71.6 seconds hill.",wk:"No elite mode. VMP plus 1.5 is solidly average. Cannot carry alone.",dig:"Estreal is Minnesota steadiest hand. No elite ceiling but no floor either. At Birmingham his consistency will anchor whatever gameplan G2 runs."},dig:"The most consistent mid tier player in the CDL. Estreal VMP barely changes between M1 and M2 and his mode splits are almost perfectly balanced. He is the definition of a system player who never loses you a map but rarely wins one by himself. Minnesota needs him to be exactly this: reliable. His HP VMP of plus 1.6 anchors the team Hardpoint structure."},
{n:"KiSMET",t:"RYD",o:77,ro:"OBJ CARRIER",kd:0.97,bpr:1.01,m2:{hpK:0.98,sndK:1.01,ovlK:0.94,hpDmg:3250,hpHill:69.1,sndOd:0.506,ovlG:1.07,dig:"KiSMET is the Riyadh system player. His VMP of plus 0.5 is near average but his role is to hold structure while Cellium and Pred create plays. His HP hill time is elite and his OVL goals are solid. The SND VMP of plus 0.3 is exactly what Riyadh needs from their fourth man: do not hurt the team. Tonight he went 1.93 in Map 4 HP showing he can carry when the game allows it.",str:"Fourth highest hill time in the league at 74.1 seconds. Positive in every mode. System player who makes the structure work.",wk:"Declined from plus 2.0 VMP in M1 to plus 1.2 in M2Q. No elite ceiling in any mode. Mirrors team trajectory downward."},dig:"KiSMET is the system player on Riyadh who makes the structure work without generating headlines. His VMP of plus 0.5 is exactly where you want your fourth player: positive enough to not be a liability, stable enough to not have off days. His hill time of 74.1 seconds is the fourth highest in the league. He declined from plus 2.0 in M1 to plus 1.2 in M2Q which mirrors the team trajectory. Solid but unspectacular."},
{n:"Insight",t:"TOR",o:74,ro:"OBJ CARRIER",kd:0.99,bpr:1.0,m2:{hpK:0.98,sndK:0.88,ovlK:1.04,hpDmg:2984,hpHill:64.8,sndOd:0.500,ovlG:0.95,str:"OVL KD 1.08 improved. 13 goals elite OBJ. LAN buff plus 0.030 third highest.",wk:"HP KD 0.97 and SND KD 0.89 both below average. Tonight 0.39 HP against TX was worst individual map.",dig:"Insight LAN buff of plus 0.030 is third highest in CDL. His OVL OBJ value is real. But tonight against TX he went 0.39 HP and 0.88 SND showing the floor is low when the matchup is tough."},dig:"Insight had the worst individual performance of anyone tonight going 0.39 in Den HP against Texas with 9 kills and 23 deaths. His SND VMP of minus 3.0 is bottom 5 in the league which is a problem for a player who was once considered an SND specialist. His OVL VMP of plus 2.0 and HP VMP of plus 1.6 show he is still useful in respawn but the SND collapse means Toronto cannot rely on him in close matches. His LAN adjustment of plus 0.07 gives some hope."},
{n:"Neptune",t:"M8",o:77,ro:"FLEX",kd:1.05,bpr:1.07,m2:{hpK:1.08,sndK:1.08,ovlK:0.99,hpDmg:3375,hpHill:49.9,sndOd:0.537,ovlG:0.46,dig:"Neptune declining M2Q is a major factor in M8 freefall. He went from 86 OVR to 73 OVR across majors. Tonight he showed flashes with 1.52 OVL but also went 0.43 HP. The inconsistency plus Envoy means M8 have two unreliable players.",str:"M1 OVR 86 showed strong form. Tonight 1.52 OVL Map 3 showed flashes.",wk:"Declined from plus 2.1 M1 to minus 0.4 M2 VMP. LAN minus 0.024. Inconsistent."},dig:"Neptune declining M2Q is a major factor in M8 freefall. He went from a plus 2.1 VMP in M1 to minus 0.4 in M2Q which is a 2.5 point swing. His SND dipped from 1.15 to 1.00 and his OVL fell from 0.94 to 1.05. Tonight against LAT he showed flashes with a 1.52 OVL KD in Map 3 but went 0.43 in Map 1 HP. The inconsistency combined with Envoy as a teammate means M8 have two unreliable players in a four man roster."},
{n:"Traixx",t:"MIA",o:76,ro:"OBJ CARRIER",kd:1.01,bpr:1.02,m2:{hpK:1.01,sndK:1.06,ovlK:0.98,hpDmg:3136,hpHill:52.5,sndOd:0.516,ovlG:0.81,str:"Third largest VMP improvement M1 to M2 in league. SND improved from 0.97 to 1.15.",wk:"Fourth best player on MIA. No elite mode.",dig:"Traixx quiet fourth on Miami went from minus 2.3 M1 to plus 1.5 M2 which is the third largest improvement in the league. He is no longer the automatic weak link which raises Miami floor significantly for Birmingham."},dig:"Traixx is the quiet fourth on Miami who rarely gets attention but his VMP trend tells an important story. He went from minus 2.3 in M1 to plus 1.5 in M2Q which is the third largest improvement in the league. His SND improved from 0.97 to 1.15 and his role execution has become more consistent. He is no longer the automatic weak link on Miami which raises their floor significantly heading into Birmingham."},
{n:"HyDra",t:"LAT",o:82,ro:"STAR | HP ENGINE",kd:1.06,bpr:1.05,lan:0.01,m2:{hpK:1.04,sndK:0.99,ovlK:1.1,hpDmg:3187,hpHill:58.0,sndOd:0.534,ovlG:0.82,dig:"HyDra is the most consistent player in the CDL. You know exactly what you get every series. Tonight he was MVP against M8 despite only 1.07 KD because his consistency let LAT play through Scrap ups and downs. His 1.80 Game 5 SND was the clutch moment.",str:"Most consistent player in CDL. 1.06 to 1.16 KD range with no variance. LAN neutral.",wk:"No elite SND ceiling. NTK slightly below average."},str:"HP 1.06-1.16 range across modes. Most consistent output in CDL. BO6 #2.",wk:"No elite SND ceiling. NTK slightly below average.",dig:"LAT second star. You know exactly what you get  -  no variance. Tonight carried Game 5 SND with 1.80 KD."},
{n:"aBeZy",t:"LAT",o:77,ro:"OBJ CARRIER",kd:1.02,bpr:1.04,m2:{hpK:1.07,sndK:0.99,ovlK:0.95,hpDmg:3023,hpHill:67.5,sndOd:0.462,ovlG:0.46,dig:"aBeZy is a statistical puzzle. He helps LAT in HP but hurts in the other two modes. At Birmingham he needs to stay in his HP lane and let HyDra and Nium carry the other modes.",str:"HP VMP of plus 2.3 strong. LAN neutral at minus 0.004.",wk:"SND VMP minus 1.1 and OVL VMP minus 0.7 drag overall to plus 0.5. Stagnated M1 to M2."},dig:"aBeZy is a statistical puzzle. His HP VMP of plus 2.3 is strong but his SND VMP of minus 1.1 and OVL VMP of minus 0.7 drag his overall down to plus 0.5. This means he helps LAT in HP but hurts them in the other two modes. His M1 to M2 trend shows a decline from minus 0.1 to minus 0.1 which is stagnation not improvement. At Birmingham he needs to stay in his HP lane and let HyDra and Nium carry the other modes."},
{n:"Sib",t:"M8",o:75,ro:"FLEX",kd:1.0,bpr:1.02,m2:{hpK:0.97,sndK:1.0,ovlK:1.06,hpDmg:3388,hpHill:56.9,sndOd:0.516,ovlG:0.50,dig:"Sib freefall mirrors M8 collapse perfectly. His OVR dropped 16 points across majors. The saving grace is his LAN buff which is the second highest in the league. If M8 survive the play-in the LAN version of Sib is a different player.",str:"M1 OVR 84 was strong. LAN buff plus 0.038 after correction second highest.",wk:"Freefall from 84 OVR M1 to 68 OVR M2. HP KD fell from 1.00 to 0.94. SND from 1.12 to 0.86."},dig:"Sib freefall from M1 to M2 mirrors M8 collapse perfectly. He went from plus 1.3 VMP to minus 1.6 which is the fifth largest decline of any player. His HP KD fell from 1.00 to 0.94 and his SND dropped from 1.12 to 0.86. The saving grace is his LAN adjustment of plus 0.10 which is the second highest in the league. If M8 can survive the play-in at Birmingham the LAN version of Sib is a completely different player."},
{n:"Lurqxx",t:"CAR",o:73,ro:"FLEX",kd:1.06,bpr:1.0,m2:{hpK:1.1,sndK:0.93,ovlK:1.03,hpDmg:3442,hpHill:56.9,sndOd:0.403,ovlG:0.83,str:"Rose from minus 2.1 M1 to plus 1.2 M2 VMP. HP KD 1.14 in M2Q elite engagement.",wk:"SND VMP minus 2.6 terrible. Season SND inconsistent.",dig:"Lurqxx M1 to M2 rise is significant for Carolina play-in chances. His HP engagement is elite but SND remains a hole that opponents can exploit."},str:"Rose from minus 2.1 M1 to plus 1.2 M2 VMP. HP KD 1.14 in M2Q. Elite HP engagement.",wk:"SND VMP minus 2.6 is terrible. Season SND KD dropped to 0.75 M1 before recovering. Inconsistent mode profile."},
{n:"Nero",t:"CAR",o:72,ro:"FLEX",kd:1.01,bpr:0.97,m2:{hpK:1.03,sndK:0.98,ovlK:1.0,hpDmg:3336,hpHill:70.1,sndOd:0.537,ovlG:0.62,str:"Improved from minus 1.1 M1 to 0.0 M2 VMP. LAN plus 0.014 positive.",wk:"OVL VMP minus 1.5. Fourth option on mid-tier team.",dig:"Nero steady improvement from M1 gives Carolina another reliable body at Birmingham. His LAN adjustment is slightly positive which helps in the play-in."},str:"Improved from minus 1.1 M1 to 0.0 M2 VMP. Most improved Carolina player. Positive HP.",wk:"OVL VMP minus 1.5. No elite mode. Fourth option on a middle of the pack team."},
{n:"Skyz",t:"MIN",o:73,ro:"OBJ CARRIER",kd:0.96,bpr:0.99,m2:{hpK:1.0,sndK:1.02,ovlK:0.87,hpDmg:3192,hpHill:67.8,sndOd:0.612,ovlG:0.67,str:"Massive M1 to M2 improvement from minus 3.4 to plus 0.9. HP KD 1.11 and SND 1.18 in M2Q.",wk:"OVL KD 0.87 liability. Season VMP only plus 0.4 because M1 was terrible.",dig:"Skyz M1 to M2 improvement is one of the largest in the league. Whether the M2 version or M1 version shows up at Birmingham will determine Minnesota ceiling."},str:"Massive M1 to M2 improvement from minus 3.4 to plus 0.9. M2Q HP KD 1.11 and SND 1.18 both above average.",wk:"OVL KD 0.87 is a liability. Season VMP only plus 0.4 because M1 was terrible. Inconsistent across splits."},
{n:"Lunarz",t:"VAN",o:73,ro:"OBJ CARRIER",kd:1.02,bpr:0.92,m2:{hpK:1.05,sndK:0.98,ovlK:0.99,hpDmg:3158,hpHill:52.0,sndOd:0.417,ovlG:0.92,str:"LAN buff plus 0.026. VAN genuinely better on stage.",wk:"M2 VMP minus 2.4 significant decline.",dig:"Lunarz LAN buff is real and makes VAN slightly better on stage. But minus 2.4 M2 VMP means even with the buff he is a liability at Birmingham."},str:"LAN buff plus 0.026 after correction. VAN genuinely better at LAN.",wk:"M2 VMP minus 2.4 significant decline from M1.",dig:"Lunarz LAN buff is real and makes VAN a slightly better team on stage than online. But minus 2.4 M2 VMP means even with the buff he is a liability."},
{n:"Kremp",t:"MIN",o:75,ro:"FLEX",kd:1.02,bpr:1.0,m2:{hpK:1.04,sndK:1.12,ovlK:0.95,hpDmg:3407,hpHill:59.0,sndOd:0.548,ovlG:0.49,str:"SND VMP plus 2.6 is one elite mode.",wk:"OVL VMP minus 2.5 worst on Minnesota. HP VMP minus 1.0. Only helps in SND.",dig:"Kremp only helps Minnesota in one mode. His OVL VMP of minus 2.5 is a real liability. At Birmingham if the series goes to OVL heavy maps Kremp becomes a problem."},dig:"Kremp is the most mode polarized player in the CDL. His SND VMP of plus 2.6 is elite but his OVL VMP of minus 2.5 is terrible. This means Minnesota is a completely different team depending on the mode. In SND they play like a top 4 team. In OVL they play like a bottom 4 team. The fix is either finding Kremp an OVL role that works or accepting that Minnesota will always be inconsistent."},
{n:"Huke",t:"TX",o:67,ro:"SND LIABILITY",kd:1.02,bpr:1.08,m2:{hpK:1.01,sndK:0.79,ovlK:1.13,hpDmg:3198,hpHill:43.2,sndOd:0.479,ovlG:0.54,dig:"Huke is a completely different player in M2Q versus M1. His OVR jump from 65 to 83 is one of the biggest in the league. The OVL KD of 1.21 is elite and his BPR shows massive hidden value. The SND weakness remains but on TX with Mercules and Shotzzy covering SND the system insulates him.",str:"M2Q VMP plus 1.2 with BPR 1.15 top 5 in league. OVL KD 1.21 elite. OVR rose from 65 to 83.",wk:"SND VMP minus 4.3 among worst in CDL. LAN adjustment minus 0.040 after correction is worst on TX."},dig:"Huke on Texas presents a fascinating puzzle. His overall VMP of minus 1.0 makes him look like a liability but his OVL VMP of plus 1.2 shows he has a clear role as the OVL specialist. The problem is his SND VMP of minus 4.3 which is bottom 5 in the league. Texas wins SND at 76.9 percent DESPITE Huke not because of him. On any other team Huke SND would be fatal. On Texas the system carries him."},
{n:"CleanX",t:"TOR",o:68,ro:"SND LIABILITY",kd:0.95,bpr:0.98,m2:{hpK:0.94,sndK:0.82,ovlK:1.02,hpDmg:3215,hpHill:60.1,sndOd:0.492,ovlG:0.74,str:"OVL KD 1.02 improved in M2Q.",wk:"HP and SND both below average. Tonight 0.78 overall against TX. LAN minus 0.019.",dig:"CleanX BO6 start was on fire with a 93 OVR early season. The BO7 decline to 69 M2 OVR has been steep. At Birmingham his LAN nerf makes the already average production slightly worse."},dig:"CleanX returned to the CDL this season and has been average to below average across every mode. His SND VMP of minus 3.1 is particularly concerning for a player who was historically known for SND contributions. Tonight against Texas he went 0.50 in SND and 0.81 in HP. Toronto needs more from their fourth man if they want to compete at Birmingham."},
{n:"Beans",t:"C9 (M1)",status:"DROPPED",o:70,ro:"LIABILITY",kd:0.89,bpr:0.88,m2:{hpK:0.85,sndK:1.16,ovlK:0.86,hpDmg:3174,hpHill:54.0,sndOd:0.690,ovlG:0.86,str:"SND KD 1.16 genuinely above CDL average. SND specialist who played M1 on Carolina.",wk:"HP KD 0.85 and OVL KD 0.86 are both significant liabilities. Pure SND specialist who cannot help in respawn. Only 8 series sample.",dig:"Beans is Beans played M1 on Carolina before the complete roster rebuild. His SND KD of 1.16 is above average for the entire CDL not just C9. But he is a pure SND specialist. His HP and OVL are both negative which means C9 wins SND maps through him and loses everything else. On a team with real respawn players around him Beans could be an effective fourth man."},str:"SND VMP plus 3.8 was a bright spot.",wk:"HP VMP minus 3.4. Season VMP minus 1.4. On eliminated C9.",dig:"Beans SND showed promise but HP and OVL were liabilities. C9 rebuilt from their M1 roster of Kenny Diamondcon Havok Hicksy to this M2 group. The rebuild did not improve results going from 1-7 to 2-9."},
{n:"MettalZ",t:"MIA",o:68,ro:"SND LIABILITY",kd:0.93,bpr:0.96,m2:{hpK:0.95,sndK:0.84,ovlK:0.93,hpDmg:3113,hpHill:66.2,sndOd:0.473,ovlG:0.81,str:"Improved from M1. Role execution more consistent.",wk:"Season VMP minus 2.0 significant weak link. SND VMP minus 3.2.",dig:"MettalZ is Miami structural weak link. The gap between SupeR at plus 6.0 and MettalZ at minus 2.0 is nearly 8 VMP points which is the second largest on any roster. Miami ceiling is capped by him."},dig:"MettalZ is the weak link on an otherwise strong Miami roster. His VMP of minus 1.4 is the lowest of any player on a playoff caliber team. His SND VMP of minus 3.2 is brutal and creates a 7.8 VMP gap between him and SupeR which is the second largest gap on any roster. Miami ceiling is capped by MettalZ floor. If they could upgrade this position Miami would be the clear second best team in the CDL."},
{n:"04",t:"FV",o:70,ro:"SND LIABILITY",kd:0.94,bpr:1.01,m2:{hpK:0.98,sndK:0.92,ovlK:0.88,hpDmg:3191,hpHill:51.0,sndOd:0.374,ovlG:0.92,str:"Structure from Simp and Abuzah provides cover.",wk:"Season VMP minus 1.4. SND VMP minus 3.1. LAN minus 0.033. FaZe weak link.",dig:"04 is FaZe fourth man and the player most likely to determine their Birmingham ceiling. His minus 1.4 VMP makes him the team weak link."},str:"On a team with Simp and Abuzah providing structure.",wk:"Season VMP minus 1.4. SND VMP minus 3.1. LAN minus 0.033.",dig:"04 is FaZe fourth man and the player most likely to determine their ceiling at Birmingham. His minus 1.4 VMP makes him the team weak link and with LAN adjustment minus 0.033 that gets slightly worse on stage."},
{n:"Snoopy",t:"BOS",o:69,ro:"LIABILITY",kd:0.97,bpr:0.95,m2:{hpK:0.91,sndK:0.98,ovlK:1.1,hpDmg:2912,hpHill:56.2,sndOd:0.529,ovlG:0.32,str:"M2Q showed slight improvement over M1.",wk:"HP VMP minus 2.6. Season VMP minus 3.1. LAN minus 0.035.",dig:"Snoopy eliminated with Boston. His VMP of minus 3.1 was a constant liability all season."},str:"M2Q showed slight improvement over M1.",wk:"HP VMP minus 2.6. Season VMP minus 3.1. LAN minus 0.035.",dig:"Snoopy eliminated with Boston. His VMP of minus 3.1 confirms he was a significant liability all season. LAN adjustment makes it worse."},
{n:"Mamba",t:"MIN",o:69,ro:"FLEX",kd:0.96,bpr:0.97,m2:{hpK:0.97,sndK:1.02,ovlK:0.91,hpDmg:3307,hpHill:54.3,sndOd:0.468,ovlG:0.49,str:"Stable role player. SND adequate.",wk:"VMP minus 2.6 negative every mode. OVL VMP minus 2.7 worst on Minnesota.",dig:"Mamba VMP of minus 2.6 makes him Minnesota weak link. Negative in every mode with OVL being the worst. Declining from M1."},str:"Stable role player. Season SND KD 0.98 adequate.",wk:"VMP minus 2.6. Negative in every mode. OVL VMP minus 2.7 worst on Minnesota. Declining from M1."},
{n:"Exnid",t:"RYD",o:66,ro:"SND LIABILITY",kd:1.03,bpr:1.02,m2:{hpK:1.05,sndK:0.78,ovlK:1.07,hpDmg:3287,hpHill:54.5,sndOd:0.340,ovlG:0.63,dig:"Exnid SND VMP of minus 6.0 is the single worst mode specific rating in the CDL. Combined with Cellium also being an SND liability Riyadh have two players dragging their SND win rate to 30.8 percent. This is the structural flaw that caps RYD ceiling.",str:"HP KD 1.12 in M2Q functional. Positive respawn.",wk:"SND VMP minus 6.0 worst mode specific rating in entire CDL. M2Q SND KD 0.82 with 38.5 percent OD."},dig:"Exnid SND VMP of minus 6.0 is the single worst mode-specific rating in the entire CDL. His M2Q SND KD of 0.82 combined with a 38.5 percent opening duel rate means Riyadh are starting most SND rounds at a disadvantage. In respawn he is functional with a 1.12 HP KD but the SND hole is so deep that it drags the entire team down. Riyadh SND win rate of 30.8 percent is directly tied to Exnid and Cellium both being SND liabilities."},
{n:"Gwinn",t:"VAN",o:69,ro:"SND LIABILITY",kd:0.94,bpr:0.87,m2:{hpK:0.99,sndK:0.86,ovlK:0.88,hpDmg:3325,hpHill:83.4,sndOd:0.491,ovlG:0.51,str:"Tonight Game 5 SND 3.00 KD showed ceiling. LAN neutral.",wk:"Season VMP minus 0.1 essentially average. OVL VMP minus 3.5 worst mode.",dig:"Gwinn ceiling is high when the SND game is on as tonight proved with 3.00 Game 5 KD. But his OVL VMP of minus 3.5 means VAN cannot win Overload maps which is a structural death sentence."},dig:"Gwinn tonight showed why you cannot give up on young players. He went 3.00 in Game 5 SND against Riyadh with 9 kills and 3 deaths to complete the upset. His season VMP of minus 1.7 and SND VMP of minus 2.8 suggest he is a liability but clutch performances like tonight reveal a ceiling that the overall numbers miss. His M2 VMP of minus 0.2 is a massive improvement from M1 minus 5.9. Vancouver is rising because Gwinn is developing."},
{n:"Craze",t:"CAR",o:70,ro:"LIABILITY",kd:0.95,bpr:0.97,m2:{hpK:0.95,sndK:1.03,ovlK:0.92,hpDmg:3098,hpHill:49.3,sndOd:0.480,ovlG:0.36,str:"R11 clutch ability provides Game 5 insurance.",wk:"VMP minus 1.2 negative. HP VMP minus 2.4 significant liability.",dig:"Craze VMP of minus 1.2 makes him Carolina weak link. His HP liability drags the team but R11 clutch gives Game 5 insurance."},str:"R11 clutch ability. Stable if unspectacular.",wk:"VMP minus 1.2 negative overall. HP VMP minus 2.4 significant liability.",dig:"Craze VMP of minus 1.2 makes him Carolina weak link. His HP liability drags the team down but his R11 clutch ability provides some Game 5 insurance."},
{n:"Envoy",t:"M8",o:66,ro:"DEAD FLANKER",kd:0.9,bpr:0.96,lan:0.04,m2:{hpK:0.94,sndK:0.85,ovlK:0.85,hpDmg:3154,hpHill:66.1,sndOd:0.405,ovlG:0.71,str:"Fast pace. LAN adjustment essentially neutral.",wk:"SND OD 27.3 percent worst in CDL. HP feeding below 0.90. Tonight 0.14 KD Game 5 SND with 1 kill 7 deaths. Season VMP minus 4.9. OVR dropped from 67 to 59 across majors.",dig:"There is no analytical case for keeping Envoy on this roster. His season VMP of minus 4.9 means M8 are playing three versus four. The Game 5 SND tonight was the third time he has disappeared in elimination SND this split. The replacement call is overdue."},str:"Fast pace. LAN slightly positive.",wk:"SND OD% 27.3% worst in CDL. HP feeding. Below 1.00 every map. Range 0.77-0.90. Tonight went 0.14 (1K/7D) in Game 5 SND.",dig:"There is no analytical case for keeping Envoy on this roster. His season VMP of minus 4.6 means Gentlemates Paris are playing three versus four in most maps. The Game 5 SND tonight was the final confirmation: 1 kill and 7 deaths while his team needed him most. Ghosty Neptune and Sib are all performing well enough to compete but they are being dragged down by the worst performing player in the top 8. The replacement call is overdue and every match day without a change is a wasted opportunity."},
{n:"Encourage",t:"C9",o:64,ro:"SND LIABILITY",kd:0.96,bpr:0.84,m2:{hpK:0.98,sndK:0.83,ovlK:0.96,hpDmg:3296,hpHill:52.6,sndOd:0.375,ovlG:0.74,str:"HP KD 0.98 is the closest to average of any C9 player. OVL KD 0.96 functional.",wk:"SND KD 0.83 and SND VMP minus 4.7 is a massive hole. The opposite profile of Beans and Hide.",dig:"Encourage is C9 respawn player. His HP KD of 0.98 is almost exactly league average which on C9 makes him the anchor. But his SND VMP of minus 4.7 is terrible. He is the mirror image of Hide and Beans. C9 has SND players and one respawn player but nobody who does both."},str:"Young player with development potential.",wk:"Season VMP minus 2.5. SND VMP minus 4.9. Eliminated.",dig:"Encourage on the rebuilt C9 roster has the potential to develop but current production is significantly below CDL average across all modes."},
{n:"TJHaLy",t:"VAN",o:67,ro:"LIABILITY",kd:0.91,bpr:0.88,m2:{hpK:0.91,sndK:1.02,ovlK:0.87,hpDmg:3193,hpHill:53.7,sndOd:0.447,ovlG:0.55,str:"Game 5 SND tonight 1.40 showed clutch ability.",wk:"Season VMP minus 3.0. HP VMP minus 3.9. OVL VMP minus 4.3. Liability in two of three modes.",dig:"TJHaLy VMP of minus 3.0 makes him one of the biggest liabilities on a Birmingham roster. His HP and OVL are both severely negative. The Game 5 SND tonight was a positive outlier not the norm."},dig:"TJHaLy VMP of minus 3.0 makes him one of the biggest liabilities in the CDL. His HP VMP of minus 3.9 is bottom 5 and his OVL VMP of minus 4.3 is bottom 3. The only mode where he is not actively hurting Vancouver is SND where his VMP of plus 0.3 is average. Tonight he went 0.59 in Map 1 HP and 0.63 in Map 4 HP. Vancouver upset of Riyadh happened despite TJHaLy not because of him."},
{n:"Hide",t:"C9",o:64,ro:"LIABILITY",kd:0.85,bpr:0.78,m2:{hpK:0.79,sndK:1.09,ovlK:0.86,hpDmg:2902,hpHill:50.6,sndOd:0.522,ovlG:0.56,str:"SND KD 1.09 positive. SND VMP plus 2.5 is genuinely good.",wk:"HP KD 0.79 and HP VMP minus 6.3 is the worst individual mode rating in the CDL. OVL KD 0.86 also negative. The gap between his SND and HP is the widest in the league.",dig:"Hide is the most extreme mode specialist in the CDL. His SND VMP of plus 2.5 would be respectable on any roster. His HP VMP of minus 6.3 is the worst in the league. These are two completely different players in the same body. A team that plays a heavy SND map pool could use Hide but any Hardpoint map is an automatic 3v4."},str:"SND VMP plus 2.0 showed one mode competence.",wk:"HP VMP minus 6.2 worst in CDL. Season VMP minus 3.8. Eliminated.",dig:"Hide HP VMP of minus 6.2 is the worst individual mode rating in the league. His SND was passable but the HP hole is too deep for a CDL roster."},
{n:"Purj",t:"BOS",o:59,ro:"LIABILITY",kd:0.87,bpr:0.89,m2:{hpK:0.86,sndK:0.79,ovlK:0.94,hpDmg:3069,hpHill:55.0,sndOd:0.451,ovlG:0.70,str:"OVL KD 1.0 was his one average mode.",wk:"Season VMP minus 3.5. HP VMP minus 4.6. Eliminated.",dig:"Purj eliminated with Boston. Negative in every mode except OVL where he was exactly average."},str:"OVL KD 1.0 was his one average mode.",wk:"Season VMP minus 3.5. HP VMP minus 4.6. LAN minus 0.034.",dig:"Purj eliminated with Boston. Negative in every mode except OVL where he was exactly average. His minus 3.5 VMP was a constant drag."},
{n:"Nejra",t:"C9",o:58,ro:"LIABILITY",kd:0.92,bpr:0.81,m2:{hpK:0.89,sndK:0.89,ovlK:0.99,hpDmg:3065,hpHill:34.8,sndOd:0.444,ovlG:0.56,str:"OVL KD 0.99 is his one near-average mode.",wk:"HP VMP minus 6.5 and SND VMP minus 2.5. No positive mode. VMP minus 4.8.",dig:"Nejra has no mode where he is above average. His OVL KD of 0.99 is the closest he gets. On a roster with four other struggling players there is nowhere to hide. Needs development at the Challengers level."},str:"On developmental C9 roster.",wk:"Season VMP minus 4.6. HP VMP minus 6.4. Eliminated.",dig:"Nejra production is below CDL average in every mode. Like the rest of C9 M2 roster needs significant development before being competitive."},
{n:"Okis",t:"C9",o:59,ro:"LIABILITY",kd:0.77,bpr:0.75,m2:{hpK:0.75,sndK:1.04,ovlK:0.72,hpDmg:3175,hpHill:53.7,sndOd:0.455,ovlG:0.93,str:"SND KD 1.04 is approximately average.",wk:"HP KD 0.75 lowest in CDL. OVL KD 0.72 second lowest. 0.77 overall KD is the worst in the league.",dig:"Okis 0.77 KD is the lowest in the CDL but his SND KD of 1.04 shows he is not hopeless in one mode. The respawn numbers are so far below CDL level that he needs significant development time. At 11 series the sample is large enough to be meaningful."},str:"Young prospect on development roster.",wk:"Season VMP minus 4.6. HP VMP minus 6.5. Eliminated.",dig:"Okis overall production is significantly below CDL level. His 0.77 KD is the lowest in the league. Needs Challengers development time."},

(function(){
const allC=P.map(p=>{const c=VMP[p.n]||{};return{...p,...c}}).filter(x=>x.vmp!=null);
const n=allC.length;if(n<2)return;
const sks=['hp','snd','ovl','vmp','hp_kd','snd_kd','ovl_kd','bpr','kd'];
sks.forEach(sk=>{
const vals=allC.map(p=>({n:p.n,v:p[sk]||0})).sort((a,b)=>b.v-a.v);
vals.forEach((item,rank)=>{
const pct=rank===0?100:Math.max(1,Math.round(99-(rank/(n-1))*98));
if(VMP[item.n])VMP[item.n]['tp_'+sk]=pct;
});
});
})();

function rAbout(){
var h="";
h+='<div class="sec">About CDL War Room</div>';
h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:20px;margin-bottom:12px">';
h+='<div style="font-size:16px;font-weight:900;color:var(--h);margin-bottom:8px">An impact rating system for competitive Call of Duty</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9">VMP (Value Metric Performance) captures what the box score misses. Unlike raw KD, VMP weights objective contributions, mode-specific performance, and damage output into a single composite that answers one question: is this player making their team better or worse?</div>';
h+='</div>';
h+='<div class="sec">Why VMP?</div>';
h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:20px;margin-bottom:12px">';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9">The VMP was the most iconic weapon in Black Ops 3 competitive. A versatile full-auto SMG that defined an era of Call of Duty. It was the gun everyone ran. Reliable, consistent, and in the right hands, unstoppable.</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9;margin-top:10px">We named our metric after it as a direct homage. Just like the BO3 VMP was the standard by which every SMG was measured, VMP is our attempt to be the standard by which player impact is measured in the CDL. If you know, you know.</div>';
h+='</div>';
h+='<div class="sec">How It Works</div>';
h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:20px;margin-bottom:12px">';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9">VMP is a mode-weighted composite. For each of the three game modes (Hardpoint, Search and Destroy, Overload), we calculate impact using statistics validated against actual map win rates. These are combined using weights that reflect how much each mode contributes to series outcomes. Every weight is backed by regression analysis. The specific weights and formulas are proprietary. We fine-tune and adjust whenever we feel necessary.</div>';
h+='</div>';
h+='<div class="sec">Cumulative VMP</div>';
h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:20px;margin-bottom:12px">';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9">cVMP equals VMP multiplied by series played. It measures total value accumulated, like EPM in basketball. A plus 2.0 player over 20 series has added more total value than a plus 5.0 player over 6 series. Availability and volume matter.</div>';
h+='</div>';
h+='<div class="sec">FAQ</div>';
var faqs=[["Why does a player have low VMP despite high KD?","VMP accounts for mode context, objective play, and damage. A 1.10 KD player who never touches the hill or disappears in SND will have a lower VMP than their KD suggests."],["What does the percentile mean?","Every stat is ranked against the league. 85th percentile means better than 85 percent of CDL players in that category."],["How often do ratings update?","After every match day using the latest data. Season, Major 1, and Major 2 are tracked independently."],["Is VMP predictive?","The team-level version correlates strongly with actual win rates. Individual VMP is descriptive but description is the foundation of prediction."],["Why are some players DROPPED?","They were on CDL rosters during Major 1 but replaced before Major 2. Stats preserved for history."]];
for(var i=0;i<faqs.length;i++){var qa=faqs[i];h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;margin-bottom:4px"><div style="font-size:13px;font-weight:700;color:var(--h);margin-bottom:6px">'+qa[0]+'</div><div style="font-size:12px;color:var(--sub);line-height:1.8">'+qa[1]+'</div></div>';}

h+='<div class="sec">Stress Test</div>';
h+='<div style="font-size:11px;color:var(--cap);margin-bottom:12px">The three strongest arguments against what we are doing, taken seriously.</div>';

h+='<div style="background:var(--s1);border:1px solid var(--bd);border-left:3px solid var(--red);border-radius:8px;padding:16px;margin-bottom:8px">';
h+='<div style="font-size:14px;font-weight:800;color:var(--red);margin-bottom:8px">1. You cannot quantify Call of Duty.</div>';
h+='<div style="font-size:13px;color:var(--sub);line-height:1.9;margin-bottom:10px">CoD is not baseball. There are no isolated plate appearances. Every gunfight is shaped by positioning, timing, teammate trades, comms, and a hundred micro-decisions that never appear in any stat sheet. A player can have a 0.85 KD and be the reason their team wins because they absorbed pressure, made callouts, and created space that let their teammates frag out. VMP cannot see any of that.</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9"><strong style="color:var(--h)">Our response:</strong> This is correct. VMP is blind to comms, intangibles, and the invisible labor of team play. We do not claim otherwise. What we claim is that across a large enough sample of maps, the stats we do have correlate meaningfully with winning. The second-worst player on a roster predicts team win rate at R-squared 0.79. That is not noise. VMP is an incomplete picture, but it is a picture, and right now the CDL has no other one. We would rather have an imperfect lens than no lens at all.</div>';
h+='</div>';

h+='<div style="background:var(--s1);border:1px solid var(--bd);border-left:3px solid #fbbf24;border-radius:8px;padding:16px;margin-bottom:8px">';
h+='<div style="font-size:14px;font-weight:800;color:#fbbf24;margin-bottom:8px">2. Just watch the game. The eye test is better than any model.</div>';
h+='<div style="font-size:13px;color:var(--sub);line-height:1.9;margin-bottom:10px">Anyone who actually watches competitive CoD can tell you who the best players are. You do not need a spreadsheet to know Simp is good. The people who have been in the scene for years, the analysts, the casters, the pros themselves, they have a feel for the game that no formula can replicate. Analytics in CoD is a solution looking for a problem.</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9"><strong style="color:var(--h)">Our response:</strong> The eye test is powerful and we respect it deeply. But the eye test also told people Huke was bad when his HP entry role was creating space that the stats could not capture. The eye test also cannot hold 48 players across three modes across 44 matches in its head at once. We are not replacing the eye test. We are giving it a companion. When VMP and the eye test agree, you can be confident. When they disagree, that is where the interesting conversations start. The goal is not to replace watching the game. It is to enhance it.</div>';
h+='</div>';

h+='<div style="background:var(--s1);border:1px solid var(--bd);border-left:3px solid var(--acc);border-radius:8px;padding:16px;margin-bottom:8px">';
h+='<div style="font-size:14px;font-weight:800;color:var(--acc);margin-bottom:8px">3. Your data is contaminated by team strength. Good players look good because they are on good teams.</div>';
h+='<div style="font-size:13px;color:var(--sub);line-height:1.9;margin-bottom:10px">BPR correlates at 0.87 with team win rate. That means players on winning teams get inflated ratings and players on losing teams get deflated ratings regardless of individual performance. Shotzzy looks elite partly because OpTic wins. Lunarz looks terrible partly because Vancouver loses. You are measuring team success and calling it individual impact.</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9"><strong style="color:var(--h)">Our response:</strong> This is the most legitimate criticism of VMP and we take it seriously. BPR contamination is real and documented. We have reduced BPR weighting in the formula and are actively developing opponent-adjusted metrics to further isolate individual performance. Spart posting an 84 OVR on a 30 percent win rate team is evidence that the system can identify individual talent on bad teams, but we acknowledge that bottom-roster players on losing teams are systematically undervalued and top-roster players on winning teams are systematically overvalued. This is the next frontier for VMP and we are working on it.</div>';
h+='</div>';


h+='<div class="sec">Mode Variance: Does It Matter?</div>';
h+='<div style="font-size:11px;color:var(--cap);margin-bottom:12px">If a player is elite in two modes but catastrophic in one, does it hurt their team?</div>';

h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:8px">';
h+='<div style="font-size:14px;font-weight:800;color:var(--h);margin-bottom:10px">The Huke Question</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9">Huke is the most polarizing player in the CDL by mode split. His HP VMP is minus 0.7 and his OVL is plus 1.2, both fine for an entry role. But his SND VMP is minus 5.4, the worst among starters on winning teams. His overall VMP of minus 2.1 says he is a liability.</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9;margin-top:8px">But OpTic Texas has the best SND win rate in the CDL at 75 percent. How? Because Mercules has a plus 10.2 SND VMP and Shotzzy has plus 3.7. Those two alone produce plus 13.9 SND, which more than covers Huke minus 5.4 and Dashy minus 0.6. <strong style="color:var(--h)">Huke is a specialist whose weakness is absorbed by his teammates.</strong></div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9;margin-top:8px">This is the difference between a liability on a bad team and a role player on a great team. The same minus 5.4 SND on Vancouver would be catastrophic. On Texas, it is a cost they can afford.</div>';
h+='</div>';

h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:8px">';
h+='<div style="font-size:14px;font-weight:800;color:var(--h);margin-bottom:10px">What The Data Says</div>';
h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
h+='<div style="background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--cap);font-weight:700">MODE VARIANCE vs WIN RATE</div><div style="font-family:var(--mono);font-size:24px;font-weight:900;color:var(--sub);margin:6px 0">r = 0.08</div><div style="font-size:11px;color:var(--sub)">Essentially zero correlation. Variance does not predict winning or losing.</div></div>';
h+='<div style="background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--cap);font-weight:700">SPECIALIST AVG VMP</div><div style="font-family:var(--mono);font-size:24px;font-weight:900;color:var(--red);margin:6px 0">-3.1</div><div style="font-size:11px;color:var(--sub)">Players with 8 or more mode range average deeply negative VMP.</div></div>';
h+='</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9">Mode variance itself does not hurt teams. Texas has the highest average mode variance in the league AND the best record. What matters is <strong style="color:var(--h)">whether the team has enough surplus in the specialist mode to absorb the deficit.</strong> Texas can afford Huke because Mercules is historically good at SND. Riyadh cannot afford Exnid minus 5.7 SND because Cellium is also negative in SND at minus 0.4.</div>';
h+='<div style="font-size:13px;color:var(--tx);line-height:1.9;margin-top:8px">The formula punishes specialists because on average they are worse players. But the formula is correct to do so. The question is not whether VMP is fair to Huke individually. The question is whether Huke on THIS team helps them win. And the answer, given his teammates, is yes, but not because of his VMP. Because of theirs.</div>';
h+='</div>';



h+='<div class="sec">Confidence Report</div>';
h+='<div style="font-size:11px;color:var(--cap);margin-bottom:8px">Honest assessment of where we trust our ratings and where we do not. Flags highlight players whose VMP may be inflated, deflated, or unstable.</div>';

var flagData=[];
var pNames=Object.keys(VMP);
var wrMap={TX:.79,MIA:.62,FV:.51,LAT:.57,RYD:.60,TOR:.43,M8:.44,CAR:.54,MIN:.50,BOS:.39,VAN:.38,C9:.32};
for(var i=0;i<pNames.length;i++){
var pn=pNames[i];var pd=VMP[pn];
if(!pd.team||pd.team.indexOf("(")>=0||pd.status==="DROPPED")continue;

if((pd.series||20)<10)flags.push("SMALL SAMPLE");
var modes=[pd.vmp_hp||0,pd.vmp_snd||0,pd.vmp_ovl||0];

var worstMode=["HP","SND","OVL"][worstIdx];

if((pd.vmp||0)>0&&(pd.kd||1)<0.95)flags.push("ROLE BOOST");
var sndPct=Math.abs((pd.vmp_snd||0)*0.35)/Math.max(0.1,Math.abs(pd.vmp||0.1));
if(sndPct>0.50&&(pd.vmp||0)>1.0)flags.push("SND-DOMINANT ("+Math.round(sndPct*100)+"%)");
if((pd.vmp||0)<-1&&(pd.kd||1)>1.05)flags.push("KD MIRAGE");
var conf=90;
if((pd.series||20)<8)conf-=15;else if((pd.series||20)<12)conf-=5;
conf-=bprRes*80;
conf-=Math.abs(twr-0.5)*20;
if(pd.m1_vmp!=null&&pd.m2_vmp!=null&&Math.abs(pd.m1_vmp-pd.m2_vmp)>3)conf-=8;
conf=Math.max(40,Math.min(95,Math.round(conf)));
flagData.push({n:pn,t:pd.team,vmp:pd.vmp||0,ovr:pd.ovr||70,conf:conf,flags:flags});
}

var flC=fl.indexOf("INFLATED")>=0?"rgba(248,113,113,.15)":fl.indexOf("DEFLATED")>=0?"rgba(96,165,250,.15)":fl.indexOf("VOLATILE")>=0?"rgba(251,191,36,.15)":fl.indexOf("SMALL")>=0?"rgba(168,162,158,.15)":"rgba(251,191,36,.1)";
