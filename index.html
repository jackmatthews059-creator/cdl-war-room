<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CDL War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111318;--s1:#181b22;--s2:#1e222b;--s3:#262b36;--s4:#2f3544;--bd:#2f3544;--bd2:#3d4556;--h:#f0f2f5;--tx:#c8cdd8;--sub:#8b93a5;--cap:#5e667a;--grn:#10b981;--grn2:#065f46;--grn3:#022c22;--red:#f87171;--red2:#991b1b;--acc:#60a5fa;--mono:'JetBrains Mono',monospace;--sans:Inter,system-ui,sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.w{max-width:1160px;margin:0 auto;padding:0 20px 80px}
.hd{padding:16px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--bd)}
.hd-t{font-size:24px;font-weight:900;color:var(--h);letter-spacing:-.5px}.hd-t span{font-weight:400;color:var(--cap)}
.hd-m{display:flex;gap:20px}.hd-n b{font-family:var(--mono);font-size:18px;color:var(--grn);display:block}.hd-n span{font-size:9px;color:var(--cap);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.tb{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:16px;overflow-x:auto;scrollbar-width:none}.tb::-webkit-scrollbar{display:none}
.tb button{padding:10px 16px;font-size:11px;font-weight:700;color:var(--cap);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.1s;letter-spacing:.3px;white-space:nowrap}
.tb button:hover{color:var(--tx)}.tb button.on{color:var(--h);border-bottom-color:var(--grn)}
.sec{font-size:12px;font-weight:900;color:var(--h);letter-spacing:2px;text-transform:uppercase;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--bd)}
.c{background:var(--s1);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:.15s}.c:hover{border-color:var(--bd2)}
.c-h{padding:14px 16px;cursor:pointer;user-select:none}.c-b{padding:4px 16px 16px;display:none;border-top:1px solid var(--s3)}.c-b.on{display:block}
.bg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.3px;display:inline-flex;align-items:center}
.dt{width:100%;border-collapse:collapse;background:var(--s1)}
.dt th{padding:9px 5px;text-align:center;font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.8px;border-bottom:2px solid var(--bd);cursor:pointer;user-select:none;white-space:nowrap;background:var(--s2)}.dt th.on{color:var(--grn)}.dt th:first-child{text-align:left;padding-left:10px}
.dt td{padding:0;text-align:center;border-bottom:1px solid var(--s3);vertical-align:middle}.dt td:first-child{text-align:left;padding:6px 10px}.dt tr:hover td{background:var(--s3)!important}
.sc{padding:6px 4px;min-width:50px;border-radius:3px;margin:1px}.sc .rv{font-family:var(--mono);font-size:13px;font-weight:800;color:#fff}.sc .pc{font-family:var(--mono);font-size:9px;font-weight:800;color:rgba(255,255,255,.7);margin-top:1px}
.sc.vmp{border-left:2px solid var(--bd);border-right:2px solid var(--bd)}
.mb{flex:1}.mb-t{display:flex;justify-content:space-between;margin-bottom:2px}.mb-l{font-size:10px;color:var(--sub);font-weight:700;letter-spacing:1px}.mb-v{font-family:var(--mono);font-size:12px;font-weight:700}.mb-b{height:8px;background:var(--s3);border-radius:4px;overflow:hidden}.mb-f{height:100%;border-radius:3px}
.hm{display:grid;gap:1px;background:var(--s2);border-radius:6px;overflow:hidden;border:1px solid var(--bd)}.hm-c{padding:7px 2px;text-align:center;font-family:var(--mono);font-weight:600;font-size:11px;min-width:44px}.hm-h{font-size:10px;font-weight:700;color:var(--sub);padding:7px 3px}

.bx{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:12px 14px}
.dg{font-size:13px;color:var(--tx);line-height:1.75;background:var(--s2);border:1px solid var(--bd);padding:12px 14px;border-radius:6px;margin-top:6px}
.sr{width:100%;padding:9px 12px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--h);font-size:13px;outline:none;font-family:var(--sans)}.sr:focus{border-color:var(--grn)}.sr::placeholder{color:var(--cap)}
.pl{display:flex;gap:3px;flex-wrap:wrap;margin:6px 0}
.pp{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid var(--bd);background:var(--s2);color:var(--sub);cursor:pointer;transition:.1s}.pp:hover{border-color:var(--sub);color:var(--tx)}.pp.on{border-color:var(--grn);color:var(--grn);background:var(--grn3)}
.cm{position:fixed;bottom:0;left:0;right:0;background:rgba(17,19,24,.97);border-top:1px solid var(--bd);padding:8px 24px;display:none;align-items:center;justify-content:center;gap:12px;z-index:100;backdrop-filter:blur(8px)}.cm.on{display:flex}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;place-items:center;backdrop-filter:blur(3px)}.mo.on{display:grid}
.ml{background:var(--s1);border:1px solid var(--bd);border-radius:8px;max-width:800px;width:95%;max-height:90vh;overflow-y:auto;padding:24px}
.cv{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;background:var(--s3);font-size:8px;color:var(--sub);transition:transform .2s;flex-shrink:0}.cv.on{transform:rotate(180deg)}
.bx-map{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:6px}
.bx-tbl{width:100%;border-collapse:collapse;font-size:11px}.bx-tbl td{padding:4px 5px;font-family:var(--mono);font-size:10px;border-bottom:1px solid var(--s3)}.bx-tbl .bn{font-family:var(--sans);font-weight:600;font-size:11px}
</style></head><body>

{n:"SupeR",t:"MIA",o:98,ro:"OPENING PLAYMAKER",kd:1.15,bpr:1.1,lan:-0.13,fb:20.8,m2:{hpK:1.09,sndK:1.38,ovlK:1.16,hpDmg:3079,hpHill:58.1,sndOd:0.757,ovlG:0.91,str:"Best SND player in the CDL with a 1.38 KD. First blood rate warps how opponents play. Miami wins SND while outslayed 60 percent of the time. Season VMP of plus 6.0 is highest in the league by over a point.",wk:"HP pace slower than ideal. BO6 LAN data shows minus 0.130 raw adjustment that shrinks to minus 0.042 after Bayesian correction. The online to LAN SND gap is real.",dig:"SupeR is the CDL equivalent of a pitcher with a 97 mph fastball. When the velocity is there nobody can touch him. Tonight he went 1.34 overall with a 2.00 SND KD. His VMP of plus 6.0 is the highest in the league. If he shows up at LAN like he did tonight Miami is a Finals contender. If the LAN nerf kicks in they are a first round exit."},str:"Best SND player in the league. Wins 1 in 5 opening gunfights. MIA wins SND while outslayed 60% of the time. Season 1.38 SND KD is absurd.",wk:"Slower HP pace than ideal. Recent cold streak to 0.93. LAN -0.13 concern.",dig:"SupeR is the CDL equivalent of a pitcher with a 97 mph fastball. When the velocity is there nobody can touch him. Tonight he went 1.34 overall with a 2.00 SND KD including 12 kills on 6 deaths in Exposure SND. His VMP of plus 5.9 is the highest in the league by over a full point. If he shows up at LAN like he did tonight Miami is a legitimate Finals contender. If the LAN nerf kicks in they are a first round exit."},
{n:"Mercules",t:"TX",o:96,ro:"LURK ASSASSIN",kd:1.12,bpr:1.18,lan:-0.1,fb:10.8,m2:{hpK:1.06,sndK:1.53,ovlK:1.1,hpDmg:3348,hpHill:68.9,sndOd:0.491,ovlG:1.16,str:"Highest BPR in the league at 1.20. Lurk and trade style generates massive hidden value. SND KD 1.53 through positioning not gunfights. Positive in every mode across every split.",wk:"Rarely takes first fight. HP KD functional not dominant. Raw LAN adjustment of minus 0.103 shrinks to minus 0.028 after Bayesian correction for 3 LAN sample. High online peak means some regression is expected regardless.",dig:"Mercules is the glue that makes Texas work. His VMP of plus 4.8 ranks second overall but the way he generates value is completely unique. While most high VMP players are fraggers Mercules creates impact through lurks trades and rotations. His 1.80 KD in Raid SND tonight showed the ceiling. The LAN concern is real but small sample and the lurk style should translate."},str:"Highest BPR in the league (1.20 season). SND KD 1.53 through lurk/trade style. Positive on every map in every mode.",wk:"Rarely takes first fight. HP KD functional not dominant. LAN -0.10.",dig:"Mercules is the glue that makes Texas work. His VMP of plus 4.4 ranks second overall but the way he generates that value is completely unique. While most high VMP players are fraggers Mercules creates impact through lurks trades and rotations. He is the reason Texas closes out tight SNDs and his 1.80 KD in Raid SND tonight showed the ceiling. The LAN nerf is the only concern but the Texas system may insulate him."},
{n:"Abuzah",t:"FV",o:94,ro:"DUAL-THREAT ANCHOR",kd:1.1,bpr:1.1,lan:-0.02,m2:{hpK:1.03,sndK:1.4,ovlK:1.11,hpDmg:3304,hpHill:85.7,sndOd:0.661,ovlG:1.21,str:"Elite SND entry at 66 percent opening duel rate. Also anchors HP at 85.7 seconds hill time. SND VMP of plus 6.9 is absurd. VMP rose from plus 2.6 to plus 3.4 with corrected mode weights because SND matters more.",wk:"HP KD 1.03 is below his anchor peers because he absorbs deaths on hill. FaZe R11 rate of 29 percent despite his individual SND excellence. Overloaded with entry and anchor duties.",dig:"FaZe lives and dies with Abuzah. His BO6 SND KD was 0.88 and he has completely transformed that to 1.40 in BO7 which is one of the biggest year over year improvements in CDL history. The concern is that FaZe 29 percent R11 rate means his individual brilliance is not translating to team clutch situations."},str:"Elite SND entry at 66% OD%. Also anchors HP at 85.7s hill time. LAN neutral.",wk:"HP KD negative because he absorbs deaths on hill. Overloaded with 3 roles. FV 29% R11 despite his SND.",dig:"FaZe lives and dies with Abuzah. SND entry AND HP anchor in one player which is unsustainable. FV 29% R11 means his individual brilliance is not translating to team clutch."},
{n:"Cellium",t:"RYD",o:92,ro:"HP/OVL ANCHOR",kd:1.13,bpr:1.07,lan:-0.04,m2:{hpK:1.13,sndK:1.0,ovlK:1.17,hpDmg:3212,hpHill:83.6,sndOd:0.556,ovlG:0.88,str:"Best anchor in the CDL. 83.6 seconds hill time. OVL KD 1.17 elite. NTK percentage highest in the league. HP VMP of plus 5.4 is the single highest mode specific rating.",wk:"SND has completely collapsed to 0.65 M2Q KD. With SND now weighted at 35 percent his overall VMP dropped from plus 3.2 to plus 2.0. RYD SND win rate of 30.8 percent. LAN adjustment minus 0.017 after correction.",dig:"Cellium presents the most extreme statistical profile in the CDL. His HP VMP is the highest in the league. His SND is essentially average. This means Riyadh needs to win in four maps or less because every Game 5 SND is a liability. Until the SND problem is solved Riyadh has a hard ceiling."},str:"Best anchor in CoD. 83.6s hill time. OVL 1.17 KD elite. NTK highest in league. Season HP 1.13 confirmed.",wk:"SND collapsed  -  season 1.00 masks the M2Q 0.65. RYD 36% SND because of him and Exnid.",dig:"Cellium presents the most extreme statistical profile in the CDL. His HP VMP of plus 5.4 is the highest in the league. His SND VMP is plus 0.2 which is essentially average. This means Riyadh needs to win in four maps or less because every Game 5 SND is a liability. Tonight against Vancouver he proved both sides of this coin: he was the best player in the lobby in Map 4 HP going 2.33 and invisible in Map 5 SND going 0.43. Until the SND problem is solved Riyadh has a hard ceiling at Major 2."},
{n:"Kips",t:"TOR",o:91,ro:"THREE-ROLE CARRY",kd:1.07,bpr:1.14,m2:{hpK:1.05,sndK:1.3,ovlK:1.04,hpDmg:3625,hpHill:74.2,sndOd:0.571,ovlG:0.75,dig:"Everything on Toronto runs through Kips. He covers three roles which is both his superpower and ceiling. Tonight against Texas he went 0.84 overall showing what happens when the three role burden catches up. But his 1.31 HP KD in Map 1 proves the talent is elite.",str:"Second highest HP damage in CDL at 3625. SND 1.30 elite. Covers sniper entry and anchor alone. Season VMP plus 2.9.",wk:"OVL average. Three role fatigue risk in long series. Small sample of 8 series in season data. No M1 data."},str:"Second-highest HP damage in CDL (3625). SND 1.30 elite. Covers sniper, entry, anchor alone.",wk:"OVL average. Three-role fatigue risk in long series. Only 8 series sample.",dig:"Everything runs through Kips. Toronto is a playoff team because of him. Covers three roles which is both superpower and risk."},
{n:"Ghosty",t:"M8",o:90,ro:"OBJ ANCHOR",kd:1.07,bpr:1.08,lan:-0.04,m2:{hpK:1.12,sndK:1.05,ovlK:1.0,hpDmg:3316,hpHill:92.3,sndOd:0.467,ovlG:0.88,str:"Third best hill holder at 83 seconds. M8 wins 29 percent of maps while outslayed because of his OBJ. HP VMP of plus 5.9 highest in the league.",wk:"SND declined in M2Q. OVR dropped from 93 to 85 across majors. LAN adjustment minus 0.014. Tonight 0.43 Map 1 HP.",dig:"Ghosty is the anchor keeping M8 competitive despite the Envoy problem. His HP VMP of plus 5.9 is the highest in the league even above Cellium. But the M8 losing trend means his individual excellence is being wasted. If M8 makes a roster move Ghosty plus Sib plus Neptune is a core that can compete."},str:"Third-best hill holder (83s). M8 wins 29% of maps while outslayed  -  highest in CDL  -  because of his OBJ play. NTK elite.",wk:"SND declining. LAN -0.04. Tonight went 0.43 HP KD in Map 1 vs LAT.",dig:"Ghosty is the anchor keeping M8 competitive despite the Envoy problem. His HP VMP of plus 5.9 is actually the highest in the league even above Cellium. But the M8 losing trend means his individual excellence is being wasted. He cannot hold the hill and carry SND and cover for Envoy all at once. Tonight he went 0.43 in Map 1 HP but recovered to 1.33 in Map 4 showing the resilience is still there. If M8 makes a roster move Ghosty plus Sib plus Neptune is a core that can compete with anyone in the league."},
{n:"JoeDec",t:"TOR",o:89,ro:"OVL CLOSER",kd:1.13,bpr:1.08,lan:0.11,m2:{hpK:1.09,sndK:1.07,ovlK:1.23,hpDmg:3454,hpHill:55.3,sndOd:0.559,ovlG:1.00,str:"OVL KD 1.23 elite. Gets better at LAN with biggest buff in CDL at plus 0.045 after Bayesian correction. NTK strong.",wk:"SND cratered from 1.26 M1 to 0.90 M2Q. OVR dropped from 95 to 81. Lost SND identity.",dig:"Toronto OVL star and LAN wild card. His plus 0.045 LAN buff is the largest in the CDL even after Bayesian shrinkage. On Den he is the best player in the league. The SND collapse hurts Game 5 chances but if TOR can avoid Game 5 SND JoeDec elevates on stage."},str:"OVL 1.23 KD elite. Season 1.13 KD. Gets better at LAN (+0.11). NTK strong.",wk:"SND cratered from 1.07 season to 0.90 in M2Q. Lost SND identity.",dig:"Toronto OVL star and LAN wild card. +0.11 LAN buff is biggest in CDL. On Den he is the best player in the league. SND collapse hurts Game 5 chances."},
{n:"Spart",t:"BOS",o:87,ro:"CARRY | ALL-MODE",kd:1.1,bpr:1.03,m2:{hpK:1.04,sndK:1.21,ovlK:1.18,hpDmg:3338,hpHill:75.8,sndOd:0.667,ovlG:0.65,str:"Positive every mode with 1.10 season KD. SND OD 66.7 percent elite entry. VMP plus 2.7.",wk:"On a 6 and 14 team that is eliminated from Birmingham. BPR 1.03 despite strong KD proves team contamination.",dig:"The most wasted talent in the CDL. On Texas or Miami he would be a franchise player. BOS outslays and still loses. His BPR of 1.03 despite strong individual stats is the clearest evidence of team contamination in the data."},str:"Positive every mode. SND OD% 66.7% elite entry. Season 1.10 KD, 1.21 SND.",wk:"On a 3-8 team. BPR 1.03 despite strong KD = team dragging him down.",dig:"The most wasted talent in the CDL. Spart is positive in every mode with a 1.10 season KD and his SND entry rate of 66.7 percent OD is elite. On Texas or Miami he would be a franchise-level player and a serious MVP candidate. Instead he is on a Boston team that is 6 and 14 and going nowhere. His BPR of 1.03 despite strong individual stats is the clearest evidence of team contamination in the data: even great players look worse when their team loses."},
{n:"Simp",t:"FV",o:85,ro:"HP DAMAGE ENGINE",kd:1.12,bpr:1.11,lan:0.02,m2:{hpK:1.12,sndK:1.2,ovlK:1.08,hpDmg:3448,hpHill:64.2,sndOd:0.545,ovlG:0.92,dig:"Simp was the best player in the CDL during Major 1 with a VMP of plus 4.5 and he has declined to plus 2.8 in M2Q. His HP damage of 3507 per 10 is still top 3 in the league but his OVL KD dropped from 1.17 in M1 to 0.97 in M2Q. The question is whether this is regression or if the meta shifted away from his style. FaZe overall declining trajectory from plus 2.4 team VMP to plus 0.7 suggests this might be systemic rather than individual. At LAN Simp historically shows up and a return to M1 form would make FaZe a dark horse.",str:"HP damage 3507 top 3 in CDL. Season HP KD 1.12. SND 1.20 solid across the year. BO6 champion pedigree.",wk:"OVL dipped below 1.00 in M2Q. VMP fell from plus 4.5 M1 to plus 1.7 M2. FaZe R11 rate of 29 percent despite his SND."},str:"HP DMG 3448 top 3 in CDL. Season 1.12 HP KD. SND 1.20 solid.",wk:"OVL 0.97-1.08 range, below average. Declining from M1 peak.",dig:"Highest HP damage output in the league alongside Scrap. Was elite everywhere in M1 but now only elite in HP. LAN neutral  -  bounce-back ability is there."},
{n:"Scrap",t:"LAT",o:83,ro:"DAMAGE ENGINE",kd:1.08,bpr:1.07,lan:-0.02,m2:{hpK:1.11,sndK:1.02,ovlK:1.04,hpDmg:3696,hpHill:64.4,sndOd:0.571,ovlG:1.49,str:"Highest HP damage in the CDL at 3696 per 10 minutes. M2Q VMP rose from minus 0.6 in M1 to plus 3.8 in M2. OVR went from 72 to 96 across majors. BO6 number 1 player carries over.",wk:"SND VMP of plus 0.9 is just average. Tonight went 0.59 in Map 4 HP for worst individual map. LAN adjustment is essentially neutral at minus 0.006 after correction.",dig:"Scrap is the engine that makes LA Thieves competitive. His 3700 HP damage is so far above league average that it warps how opponents rotate. The M1 to M2 transformation from 72 OVR to 96 OVR is the biggest individual jump in the league. His LAN neutrality is a huge asset for Birmingham."},str:"Season HP DMG 3696 highest in CDL by far. Fastest anchor. OVL goals top 3.",wk:"SND exactly average. LAN -0.02. Tonight had worst series (0.90)  -  went 0.59 in Map 4 HP.",dig:"Scrap is the engine that makes LA Thieves competitive. His 3700 HP damage per 10 is so far above the league average that it single handedly keeps LAT in Hardpoint maps they have no business winning. The M1 to M2 transformation has been remarkable with his VMP rising nearly 4.5 points. Tonight against M8 he had a poor Map 4 but still dropped a 2.40 SND KD in Map 2. The concern is consistency at LAN and whether his SND average holds against better competition."},
{n:"RenKoR",t:"MIA",o:81,ro:"FLEX | COMPLETE",kd:1.16,bpr:1.08,lan:0.02,m2:{hpK:1.22,sndK:1.05,ovlK:1.11,hpDmg:3359,hpHill:62.1,sndOd:0.500,ovlG:0.76,dig:"Miami most complete player. Tonight 1.20 series with a 1.39 OVL in Map 3. Steadiest hand on the roster. His BO6 All Star selection validates the consistency across titles.",str:"Season 1.16 KD positive in every mode. Most complete player in the CDL. SND surged to 1.21. BO6 All Star first team. LAN adjustment neutral at plus 0.008.",wk:"No elite ceiling in any single mode. HP dipped from M1 peak. Cannot carry a series alone the way SupeR can."},str:"Season 1.16 KD, positive every mode. SND surged to 1.21. LAN +0.02.",wk:"No elite ceiling in any single mode. HP dipped from M1.",dig:"Miami most complete player. Tonight 1.20 series with a 1.39 OVL in Map 3. Steadiest hand on the roster."},
{n:"Nium",t:"LAT",o:83,ro:"OBJ CARRIER",kd:1.0,bpr:1.06,m2:{hpK:0.96,sndK:0.97,ovlK:1.1,hpDmg:3088,hpHill:68.0,sndOd:0.625,ovlG:1.55,dig:"Nium OVL VMP of plus 4.3 is the second highest in the league behind only SupeR total VMP. He is a pure OVL closer and the reason LAT wins 63.6 percent of their Overload maps. His HP is average and his SND is slightly below but on a team with Scrap handling HP and aBeZy handling entries Nium just needs to show up in OVL. Tonight he went 1.53 in Map 1 HP and 2.33 in Game 5 SND showing his ceiling is higher than his season numbers suggest.",str:"OVL VMP of plus 4.3 second in the league. Transformed LAT when he arrived. OBJ presence fills the exact role LAT was missing. Strong SND OD percentage.",wk:"HP KD of 0.96 means he absorbs deaths without enough hill time. Small sample size risk with only 10 series. Unproven at LAN."},dig:"Nium transformed LA Thieves when he arrived in M2Q. His OVL VMP of plus 4.3 is second only to SupeR and he immediately became the OBJ presence LAT was missing. His 0.96 M1 proxy versus his M2Q 1.10 OVL KD shows the impact of joining a structured roster. The concern is his HP KD of 0.96 which means he absorbs deaths like an anchor without the hill time to justify it. At LAN his role will be to win OVL maps and stay out of the way in HP."},
{n:"Exceed",t:"CAR",o:82,ro:"OBJ CARRIER",kd:0.99,bpr:1.0,m2:{hpK:0.96,sndK:1.13,ovlK:0.99,hpDmg:3095,hpHill:75.6,sndOd:0.535,ovlG:1.74,str:"OVL VMP plus 2.9 top tier. Rose from minus 0.5 M1 to plus 1.3 M2.",wk:"HP KD 0.97 below average. Carolina ceiling depends on his OVL.",dig:"Exceed OVL emergence has been key to Carolina being competitive. His M1 to M2 rise mirrors the team trajectory. At Birmingham in the play-in his OVL will be critical."},dig:"The most improved player from M1 to M2. Exceed went from minus 0.5 VMP in M1 to plus 1.3 in M2Q driven by a surge in SND and OVL. His OVL VMP of plus 2.9 is top 10 in the league. Carolina R11 win rate of 80 percent is partly because of Exceed showing up in close SNDs. He is the kind of role player that makes Carolina more dangerous than their overall talent suggests."},
{n:"Dashy",t:"TX",o:81,ro:"ANCHOR | SNIPER",kd:1.0,bpr:1.09,lan:-0.04,m2:{hpK:0.98,sndK:1.03,ovlK:1.03,hpDmg:3294,hpHill:84.1,sndOd:0.508,ovlG:0.94,str:"85.7 seconds hill time second in the league. BPR 1.09 elite OBJ. Tonight 1.39 KD MVP in all three maps against Toronto.",wk:"HP KD 0.95 because he absorbs deaths on hill. Slowest tempo on TX. LAN adjustment minus 0.015 after correction.",dig:"Tonight was the Dashy game. He went 1.24 HP then 2.50 SND then 1.33 OVL to sweep Toronto. His 85.7 seconds hill time is second in the league. The M2Q has been his best split and this form at LAN makes Texas dangerous."},str:"Hill Time 85.7s season #2. BPR 1.09. OVL improved to 1.10.",wk:"HP KD 0.95  -  dies on hill. Slowest tempo on TX.",dig:"Tonight was the Dashy game. He went 1.24 in Den HP and 2.50 in Raid SND with 10 kills on 4 deaths and 1.33 in Scar OVL to sweep Toronto. His VMP of plus 2.2 reflects the anchor role perfectly: he is not the flashiest player but he creates the structure that lets Shotzzy and Huke slay. His 85.7 seconds of hill time is second in the league. The M2Q has been his best split and if this form carries to LAN he could be the difference between Texas winning Major 2 and losing in the semifinals."},
{n:"Pred",t:"RYD",o:80,ro:"SPACE CREATOR",kd:1.09,bpr:1.07,lan:0.09,m2:{hpK:1.04,sndK:1.17,ovlK:1.18,hpDmg:3159,hpHill:43.7,sndOd:0.478,ovlG:0.63,dig:"Riyadh emerging second star and the player most likely to carry them through a close match at Birmingham. His LAN buff of plus 0.029 makes him more dangerous on stage.",str:"OVL elite. Positive every category. LAN adjustment plus 0.029 after correction. M1 OVR 87.",wk:"SND dipped from 1.26 M1 to 1.08 M2Q. Slight overall decline."},str:"OVL elite. Positive every category. LAN +0.09 buff.",wk:"SND dipped from 1.26 to 1.08. Gets slightly worse at LAN on SND.",dig:"Riyadh emerging second star. Tonight went 0.92 overall but had 1.25 in Game 2 SND. His 1.26 vs TX showed his ceiling."},
{n:"Shotzzy",t:"TX",o:79,ro:"ENTRY FRAGGER",kd:1.03,bpr:1.12,lan:0.11,m2:{hpK:0.96,sndK:1.19,ovlK:1.09,hpDmg:3057,hpHill:57.5,sndOd:0.543,ovlG:0.76,dig:"The M2Q transformation of Shotzzy SND game is the single biggest individual improvement this split. Combined with Mercules lurk style Texas now has two elite SND players. His OVR jump from 82 to 93 reflects the real improvement.",str:"SND transformed from 1.06 M1 to 1.33 M2Q. BPR 1.12. OVR jumped from 82 to 93 across majors.",wk:"HP damage lowest on TX. BO6 LAN shows minus 0.070 raw that shrinks to minus 0.028 after correction. Cannot carry HP alone."},str:"SND 1.19-1.33 surging. BPR 1.12. LAN historically better.",wk:"HP damage lowest on TX. Cannot carry HP alone.",dig:"The M2Q transformation. Went from average SND to the league best entry. LAN history shows he elevates on stage."},
{n:"Nastie",t:"BOS",o:79,ro:"OBJ CARRIER",kd:1.05,bpr:0.99,m2:{hpK:1.0,sndK:0.96,ovlK:1.2,hpDmg:3117,hpHill:61.7,sndOd:0.467,ovlG:0.92,str:"OVL VMP plus 3.3 elite. Season 1.05 KD all mode positive. LAN plus 0.016.",wk:"SND VMP minus 1.7. On 6 and 14 team eliminated from Birmingham.",dig:"Nastie carries Boston in Overload. His OVL VMP is elite. But on a team this bad individual production cannot translate to wins. Eliminated from Birmingham."},dig:"Nastie is a player trapped on the wrong team. His OVL VMP of plus 3.3 is elite and he was the only positive Boston player in Map 3 OVL tonight going 1.20. His SND VMP of minus 1.7 is the drag. On a better roster his OVL production would be championship caliber but Boston 27.8 percent HP win rate means he spends most of his time in a mode his team cannot compete in."},
{n:"Drazah",t:"FV",o:78,ro:"OBJ CARRIER",kd:1.02,bpr:1.04,m2:{hpK:1.02,sndK:0.93,ovlK:1.05,hpDmg:3179,hpHill:59.1,sndOd:0.470,ovlG:1.09,str:"Positive HP and OVL. Season 1.02 KD consistent.",wk:"SND VMP minus 2.0. VMP fell from plus 1.7 M1 to minus 0.3 M2. LAN minus 0.020. Declining.",dig:"Drazah declining trajectory from M1 to M2 is a concern for FaZe at Birmingham. His BO6 LAN adjustment FLIPPED from plus 0.17 to minus 0.050 which was one of the biggest corrections in the BO6 data."},dig:"Drazah profile is the inverse of what FaZe needs. His OVL VMP of plus 2.2 is strong and his HP VMP of plus 1.1 is solid but his SND VMP of minus 2.0 is a serious liability. FaZe SND win rate of 57.1 percent is decent but Drazah is pulling it down. The M1 to M2 decline from plus 1.7 VMP to minus 0.3 suggests the meta has moved away from his style."},
{n:"Estreal",t:"MIN",o:77,ro:"OBJ CARRIER",kd:1.02,bpr:1.02,m2:{hpK:1.04,sndK:1.02,ovlK:1.0,hpDmg:3164,hpHill:69.5,sndOd:0.500,ovlG:0.71,str:"Most consistent Minnesota player. Positive VMP every mode. HP KD 1.05 with 71.6 seconds hill.",wk:"No elite mode. VMP plus 1.5 is solidly average. Cannot carry alone.",dig:"Estreal is Minnesota steadiest hand. No elite ceiling but no floor either. At Birmingham his consistency will anchor whatever gameplan G2 runs."},dig:"The most consistent mid tier player in the CDL. Estreal VMP barely changes between M1 and M2 and his mode splits are almost perfectly balanced. He is the definition of a system player who never loses you a map but rarely wins one by himself. Minnesota needs him to be exactly this: reliable. His HP VMP of plus 1.6 anchors the team Hardpoint structure."},
{n:"KiSMET",t:"RYD",o:76,ro:"OBJ CARRIER",kd:0.97,bpr:1.01,m2:{hpK:0.98,sndK:1.01,ovlK:0.94,hpDmg:3250,hpHill:69.1,sndOd:0.506,ovlG:1.07,dig:"KiSMET is the Riyadh system player. His VMP of plus 0.5 is near average but his role is to hold structure while Cellium and Pred create plays. His HP hill time is elite and his OVL goals are solid. The SND VMP of plus 0.3 is exactly what Riyadh needs from their fourth man: do not hurt the team. Tonight he went 1.93 in Map 4 HP showing he can carry when the game allows it.",str:"Fourth highest hill time in the league at 74.1 seconds. Positive in every mode. System player who makes the structure work.",wk:"Declined from plus 2.0 VMP in M1 to plus 1.2 in M2Q. No elite ceiling in any mode. Mirrors team trajectory downward."},dig:"KiSMET is the system player on Riyadh who makes the structure work without generating headlines. His VMP of plus 0.5 is exactly where you want your fourth player: positive enough to not be a liability, stable enough to not have off days. His hill time of 74.1 seconds is the fourth highest in the league. He declined from plus 2.0 in M1 to plus 1.2 in M2Q which mirrors the team trajectory. Solid but unspectacular."},
{n:"Insight",t:"TOR",o:75,ro:"OBJ CARRIER",kd:0.99,bpr:1.0,m2:{hpK:0.98,sndK:0.88,ovlK:1.04,hpDmg:2984,hpHill:64.8,sndOd:0.500,ovlG:0.95,str:"OVL KD 1.08 improved. 13 goals elite OBJ. LAN buff plus 0.030 third highest.",wk:"HP KD 0.97 and SND KD 0.89 both below average. Tonight 0.39 HP against TX was worst individual map.",dig:"Insight LAN buff of plus 0.030 is third highest in CDL. His OVL OBJ value is real. But tonight against TX he went 0.39 HP and 0.88 SND showing the floor is low when the matchup is tough."},dig:"Insight had the worst individual performance of anyone tonight going 0.39 in Den HP against Texas with 9 kills and 23 deaths. His SND VMP of minus 3.0 is bottom 5 in the league which is a problem for a player who was once considered an SND specialist. His OVL VMP of plus 2.0 and HP VMP of plus 1.6 show he is still useful in respawn but the SND collapse means Toronto cannot rely on him in close matches. His LAN adjustment of plus 0.07 gives some hope."},
{n:"Neptune",t:"M8",o:74,ro:"FLEX",kd:1.05,bpr:1.07,m2:{hpK:1.08,sndK:1.08,ovlK:0.99,hpDmg:3375,hpHill:49.9,sndOd:0.537,ovlG:0.46,dig:"Neptune declining M2Q is a major factor in M8 freefall. He went from 86 OVR to 73 OVR across majors. Tonight he showed flashes with 1.52 OVL but also went 0.43 HP. The inconsistency plus Envoy means M8 have two unreliable players.",str:"M1 OVR 86 showed strong form. Tonight 1.52 OVL Map 3 showed flashes.",wk:"Declined from plus 2.1 M1 to minus 0.4 M2 VMP. LAN minus 0.024. Inconsistent."},dig:"Neptune declining M2Q is a major factor in M8 freefall. He went from a plus 2.1 VMP in M1 to minus 0.4 in M2Q which is a 2.5 point swing. His SND dipped from 1.15 to 1.00 and his OVL fell from 0.94 to 1.05. Tonight against LAT he showed flashes with a 1.52 OVL KD in Map 3 but went 0.43 in Map 1 HP. The inconsistency combined with Envoy as a teammate means M8 have two unreliable players in a four man roster."},
{n:"Traixx",t:"MIA",o:73,ro:"OBJ CARRIER",kd:1.01,bpr:1.02,m2:{hpK:1.01,sndK:1.06,ovlK:0.98,hpDmg:3136,hpHill:52.5,sndOd:0.516,ovlG:0.81,str:"Third largest VMP improvement M1 to M2 in league. SND improved from 0.97 to 1.15.",wk:"Fourth best player on MIA. No elite mode.",dig:"Traixx quiet fourth on Miami went from minus 2.3 M1 to plus 1.5 M2 which is the third largest improvement in the league. He is no longer the automatic weak link which raises Miami floor significantly for Birmingham."},dig:"Traixx is the quiet fourth on Miami who rarely gets attention but his VMP trend tells an important story. He went from minus 2.3 in M1 to plus 1.5 in M2Q which is the third largest improvement in the league. His SND improved from 0.97 to 1.15 and his role execution has become more consistent. He is no longer the automatic weak link on Miami which raises their floor significantly heading into Birmingham."},
{n:"HyDra",t:"LAT",o:72,ro:"HP-SLAYER | CONSISTENT",kd:1.06,bpr:1.05,lan:0.01,m2:{hpK:1.04,sndK:0.99,ovlK:1.1,hpDmg:3187,hpHill:58.0,sndOd:0.534,ovlG:0.82,dig:"HyDra is the most consistent player in the CDL. You know exactly what you get every series. Tonight he was MVP against M8 despite only 1.07 KD because his consistency let LAT play through Scrap ups and downs. His 1.80 Game 5 SND was the clutch moment.",str:"Most consistent player in CDL. 1.06 to 1.16 KD range with no variance. LAN neutral.",wk:"No elite SND ceiling. NTK slightly below average."},str:"HP 1.06-1.16 range across modes. Most consistent output in CDL. BO6 #2.",wk:"No elite SND ceiling. NTK slightly below average.",dig:"LAT second star. You know exactly what you get  -  no variance. Tonight carried Game 5 SND with 1.80 KD."},
{n:"aBeZy",t:"LAT",o:71,ro:"OBJ CARRIER",kd:1.02,bpr:1.04,m2:{hpK:1.07,sndK:0.99,ovlK:0.95,hpDmg:3023,hpHill:67.5,sndOd:0.462,ovlG:0.46,dig:"aBeZy is a statistical puzzle. He helps LAT in HP but hurts in the other two modes. At Birmingham he needs to stay in his HP lane and let HyDra and Nium carry the other modes.",str:"HP VMP of plus 2.3 strong. LAN neutral at minus 0.004.",wk:"SND VMP minus 1.1 and OVL VMP minus 0.7 drag overall to plus 0.5. Stagnated M1 to M2."},dig:"aBeZy is a statistical puzzle. His HP VMP of plus 2.3 is strong but his SND VMP of minus 1.1 and OVL VMP of minus 0.7 drag his overall down to plus 0.5. This means he helps LAT in HP but hurts them in the other two modes. His M1 to M2 trend shows a decline from minus 0.1 to minus 0.1 which is stagnation not improvement. At Birmingham he needs to stay in his HP lane and let HyDra and Nium carry the other modes."},
{n:"Sib",t:"M8",o:70,ro:"FLEX",kd:1.0,bpr:1.02,m2:{hpK:0.97,sndK:1.0,ovlK:1.06,hpDmg:3388,hpHill:56.9,sndOd:0.516,ovlG:0.50,dig:"Sib freefall mirrors M8 collapse perfectly. His OVR dropped 16 points across majors. The saving grace is his LAN buff which is the second highest in the league. If M8 survive the play-in the LAN version of Sib is a different player.",str:"M1 OVR 84 was strong. LAN buff plus 0.038 after correction second highest.",wk:"Freefall from 84 OVR M1 to 68 OVR M2. HP KD fell from 1.00 to 0.94. SND from 1.12 to 0.86."},dig:"Sib freefall from M1 to M2 mirrors M8 collapse perfectly. He went from plus 1.3 VMP to minus 1.6 which is the fifth largest decline of any player. His HP KD fell from 1.00 to 0.94 and his SND dropped from 1.12 to 0.86. The saving grace is his LAN adjustment of plus 0.10 which is the second highest in the league. If M8 can survive the play-in at Birmingham the LAN version of Sib is a completely different player."},
{n:"Lurqxx",t:"CAR",o:72,ro:"FLEX",kd:1.06,bpr:1.0,m2:{hpK:1.1,sndK:0.93,ovlK:1.03,hpDmg:3442,hpHill:56.9,sndOd:0.403,ovlG:0.83,str:"Rose from minus 2.1 M1 to plus 1.2 M2 VMP. HP KD 1.14 in M2Q elite engagement.",wk:"SND VMP minus 2.6 terrible. Season SND inconsistent.",dig:"Lurqxx M1 to M2 rise is significant for Carolina play-in chances. His HP engagement is elite but SND remains a hole that opponents can exploit."},str:"Rose from minus 2.1 M1 to plus 1.2 M2 VMP. HP KD 1.14 in M2Q. Elite HP engagement.",wk:"SND VMP minus 2.6 is terrible. Season SND KD dropped to 0.75 M1 before recovering. Inconsistent mode profile."},
{n:"Nero",t:"CAR",o:71,ro:"FLEX",kd:1.01,bpr:0.97,m2:{hpK:1.03,sndK:0.98,ovlK:1.0,hpDmg:3336,hpHill:70.1,sndOd:0.537,ovlG:0.62,str:"Improved from minus 1.1 M1 to 0.0 M2 VMP. LAN plus 0.014 positive.",wk:"OVL VMP minus 1.5. Fourth option on mid-tier team.",dig:"Nero steady improvement from M1 gives Carolina another reliable body at Birmingham. His LAN adjustment is slightly positive which helps in the play-in."},str:"Improved from minus 1.1 M1 to 0.0 M2 VMP. Most improved Carolina player. Positive HP.",wk:"OVL VMP minus 1.5. No elite mode. Fourth option on a middle of the pack team."},
{n:"Skyz",t:"MIN",o:70,ro:"OBJ CARRIER",kd:0.96,bpr:0.99,m2:{hpK:1.0,sndK:1.02,ovlK:0.87,hpDmg:3192,hpHill:67.8,sndOd:0.612,ovlG:0.67,str:"Massive M1 to M2 improvement from minus 3.4 to plus 0.9. HP KD 1.11 and SND 1.18 in M2Q.",wk:"OVL KD 0.87 liability. Season VMP only plus 0.4 because M1 was terrible.",dig:"Skyz M1 to M2 improvement is one of the largest in the league. Whether the M2 version or M1 version shows up at Birmingham will determine Minnesota ceiling."},str:"Massive M1 to M2 improvement from minus 3.4 to plus 0.9. M2Q HP KD 1.11 and SND 1.18 both above average.",wk:"OVL KD 0.87 is a liability. Season VMP only plus 0.4 because M1 was terrible. Inconsistent across splits."},
{n:"Lunarz",t:"VAN",o:69,ro:"OBJ CARRIER",kd:1.02,bpr:0.92,m2:{hpK:1.05,sndK:0.98,ovlK:0.99,hpDmg:3158,hpHill:52.0,sndOd:0.417,ovlG:0.92,str:"LAN buff plus 0.026. VAN genuinely better on stage.",wk:"M2 VMP minus 2.4 significant decline.",dig:"Lunarz LAN buff is real and makes VAN slightly better on stage. But minus 2.4 M2 VMP means even with the buff he is a liability at Birmingham."},str:"LAN buff plus 0.026 after correction. VAN genuinely better at LAN.",wk:"M2 VMP minus 2.4 significant decline from M1.",dig:"Lunarz LAN buff is real and makes VAN a slightly better team on stage than online. But minus 2.4 M2 VMP means even with the buff he is a liability."},
{n:"Kremp",t:"MIN",o:68,ro:"FLEX",kd:1.02,bpr:1.0,m2:{hpK:1.04,sndK:1.12,ovlK:0.95,hpDmg:3407,hpHill:59.0,sndOd:0.548,ovlG:0.49,str:"SND VMP plus 2.6 is one elite mode.",wk:"OVL VMP minus 2.5 worst on Minnesota. HP VMP minus 1.0. Only helps in SND.",dig:"Kremp only helps Minnesota in one mode. His OVL VMP of minus 2.5 is a real liability. At Birmingham if the series goes to OVL heavy maps Kremp becomes a problem."},dig:"Kremp is the most mode polarized player in the CDL. His SND VMP of plus 2.6 is elite but his OVL VMP of minus 2.5 is terrible. This means Minnesota is a completely different team depending on the mode. In SND they play like a top 4 team. In OVL they play like a bottom 4 team. The fix is either finding Kremp an OVL role that works or accepting that Minnesota will always be inconsistent."},
{n:"Huke",t:"TX",o:78,ro:"SND LIABILITY",kd:1.02,bpr:1.08,m2:{hpK:1.01,sndK:0.79,ovlK:1.13,hpDmg:3198,hpHill:43.2,sndOd:0.479,ovlG:0.54,dig:"Huke is a completely different player in M2Q versus M1. His OVR jump from 65 to 83 is one of the biggest in the league. The OVL KD of 1.21 is elite and his BPR shows massive hidden value. The SND weakness remains but on TX with Mercules and Shotzzy covering SND the system insulates him.",str:"M2Q VMP plus 1.2 with BPR 1.15 top 5 in league. OVL KD 1.21 elite. OVR rose from 65 to 83.",wk:"SND VMP minus 4.3 among worst in CDL. LAN adjustment minus 0.040 after correction is worst on TX."},dig:"Huke on Texas presents a fascinating puzzle. His overall VMP of minus 1.0 makes him look like a liability but his OVL VMP of plus 1.2 shows he has a clear role as the OVL specialist. The problem is his SND VMP of minus 4.3 which is bottom 5 in the league. Texas wins SND at 76.9 percent DESPITE Huke not because of him. On any other team Huke SND would be fatal. On Texas the system carries him."},
{n:"CleanX",t:"TOR",o:66,ro:"SND LIABILITY",kd:0.95,bpr:0.98,m2:{hpK:0.94,sndK:0.82,ovlK:1.02,hpDmg:3215,hpHill:60.1,sndOd:0.492,ovlG:0.74,str:"OVL KD 1.02 improved in M2Q.",wk:"HP and SND both below average. Tonight 0.78 overall against TX. LAN minus 0.019.",dig:"CleanX BO6 start was on fire with a 93 OVR early season. The BO7 decline to 69 M2 OVR has been steep. At Birmingham his LAN nerf makes the already average production slightly worse."},dig:"CleanX returned to the CDL this season and has been average to below average across every mode. His SND VMP of minus 3.1 is particularly concerning for a player who was historically known for SND contributions. Tonight against Texas he went 0.50 in SND and 0.81 in HP. Toronto needs more from their fourth man if they want to compete at Birmingham."},
{n:"Beans",t:"C9",o:65,ro:"LIABILITY",kd:0.89,bpr:0.88,m2:{hpK:0.85,sndK:1.16,ovlK:0.86,hpDmg:3174,hpHill:54.0,sndOd:0.690,ovlG:0.86,str:"SND VMP plus 3.8 showed one mode promise.",wk:"HP VMP minus 3.4. On eliminated C9.",dig:"Beans SND showed promise on the rebuilt C9 roster but HP and OVL were liabilities. C9 went 2-9 in M2."},str:"SND VMP plus 3.8 was a bright spot.",wk:"HP VMP minus 3.4. Season VMP minus 1.4. On eliminated C9.",dig:"Beans SND showed promise but HP and OVL were liabilities. C9 rebuilt from their M1 roster of Kenny Diamondcon Havok Hicksy to this M2 group. The rebuild did not improve results going from 1-7 to 2-9."},

return`<div style="max-width:680px;margin:0 auto;padding:20px 0"><div style="text-align:center;margin-bottom:32px"><div style="font-size:48px;font-weight:900;color:var(--h);line-height:1.05;letter-spacing:-1.5px">The First Player Impact<br>System for Competitive CoD</div><p style="font-size:17px;color:var(--sub);margin-top:14px;line-height:1.7;max-width:560px;margin-left:auto;margin-right:auto">VMP measures individual player value above the median CDL starter. Like EPM in basketball or WAR in baseball, but built from the ground up for competitive Call of Duty.</p><div style="display:flex;justify-content:center;gap:8px;margin-top:16px"><button style="background:var(--grn);color:#000;padding:12px 28px;border:none;border-radius:6px;font-weight:800;font-size:14px;cursor:pointer" onclick="tb='stats';R()">View Player Ratings</button><button style="background:var(--s3);color:var(--tx);padding:12px 28px;border:1px solid var(--bd);border-radius:6px;font-weight:800;font-size:14px;cursor:pointer" onclick="tb='results';R()">Tonight&#39;s Results</button></div></div><div class="sec">Tonight (March 22)</div>${BOX.map(b=>{const w=b.t1w>b.t2w?b.t1:b.t2;return`<div class="c" style="padding:12px 16px;border-left:4px solid ${b.upset?"#fbbf24":TC[w]};cursor:pointer" onclick="tb='results';R()"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:18px;font-weight:900;color:${TC[b.t1]}">${b.t1}</span> <span style="font-family:var(--mono);font-size:16px;font-weight:700">${b.score}</span> <span style="font-size:18px;font-weight:900;color:${TC[b.t2]}">${b.t2}</span></div><div>${b.upset?'<span class="bg" style="color:#fbbf24;background:rgba(251,191,36,.1)">UPSET</span>':""} <span style="font-size:11px;color:var(--sub)">MVP: <strong>${b.mvp}</strong> ${b.mvp_kd}</span></div></div></div>`}).join("")}<div class="sec" style="margin-top:24px">What is VMP?</div><div class="c" style="padding:16px 20px;border-left:3px solid var(--grn)"><div style="font-weight:800;font-size:15px;color:var(--h);margin-bottom:4px">Value over Median Player</div><p style="font-size:13px;color:var(--sub);line-height:1.7">VMP measures how much a player contributes to winning compared to the median CDL starter. A VMP of +3.0 means significant positive impact. A VMP of -3.0 means you are actively hurting your team. It is broken into three modes so you can see exactly where a player helps or hurts.</p></div><div class="c" style="padding:16px 20px;border-left:3px solid var(--acc)"><div style="font-weight:800;font-size:15px;color:var(--h);margin-bottom:4px">How We Built It</div><p style="font-size:13px;color:var(--sub);line-height:1.7">We tested every stat in the CDL against actual match outcomes across the full BO7 season. Some stats that analysts rely on turned out to predict almost nothing. Other stats that rarely get discussed turned out to be among the strongest indicators of winning. VMP is built on what the data says matters, not conventional wisdom.</p></div><div class="c" style="padding:16px 20px;border-left:3px solid #fbbf24"><div style="font-weight:800;font-size:15px;color:var(--h);margin-bottom:4px">The Weak Link Effect</div><p style="font-size:13px;color:var(--sub);line-height:1.7">One of our most important findings: a team&#39;s worst player explains over 80 percent of their win rate while their best player only explains 62 percent. CoD is a weak link game. Your floor matters more than your ceiling. VMP captures this reality.</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px"><div class="bx" style="cursor:pointer;border-left:3px solid var(--grn)" onclick="tb='stats';R()"><div style="font-weight:800;font-size:14px;color:var(--h);margin-bottom:4px">Stats Database</div><p style="font-size:12px;color:var(--sub)">49 players ranked by VMP with Full Season, Major 1, and Major 2 views. Click any player for scouting card with trend visualization.</p></div><div class="bx" style="cursor:pointer;border-left:3px solid var(--acc)" onclick="tb='power';R()"><div style="font-weight:800;font-size:14px;color:var(--h);margin-bottom:4px">Power Rankings</div><p style="font-size:12px;color:var(--sub)">12 teams with strength of schedule, floor and ceiling ratings, roster VMP breakdowns, and M1 to M2 trend analysis.</p></div></div></div>`}

function rChall(){return`<div class="sec">Challengers</div><div class="c" style="text-align:center;padding:40px 20px;border:2px dashed var(--bd)"><div style="font-size:36px;margin-bottom:8px">&#x1F6A7;</div><div style="font-size:16px;font-weight:800;color:var(--sub);letter-spacing:2px">UNDER CONSTRUCTION</div><p style="font-size:13px;color:var(--cap);margin-top:8px;max-width:400px;margin-left:auto;margin-right:auto">Full Challengers integration with 124 scouted prospects coming in v16. Current top prospects: qk4b (1.79 SND), Owakening (1.23 HP), oJohnny (1.27 SND), Gio (1.18 OVL).</p></div>`}

// ═══ RENDER ═══

function mkSparkline(name){
const t=TRENDS[name];if(!t)return"";
const modes=[["HP","m1_hp","m2_hp","#fbbf24"],["SND","m1_snd","m2_snd","var(--grn)"],["OVL","m1_ovl","m2_ovl","var(--acc)"]];
let bars="";
modes.forEach(([label,m1k,m2k,col],i)=>{
const m1=t[m1k],m2=t[m2k];
if(m1==null&&m2==null)return;
const x=i*90+10;
const maxH=40,mid=25;
const m1h=m1!=null?Math.max(2,Math.min(maxH,(m1-0.7)*60)):0;
const m2h=m2!=null?Math.max(2,Math.min(maxH,(m2-0.7)*60)):0;
const m1y=50-m1h,m2y=50-m2h;
if(m1!=null)bars+=`<rect x="${x}" y="${m1y}" width="28" height="${m1h}" rx="2" fill="${col}" opacity=".35"/><text x="${x+14}" y="${m1y-3}" fill="var(--cap)" font-size="8" text-anchor="middle" font-family="var(--mono)">${m1.toFixed(2)}</text>`;
if(m2!=null)bars+=`<rect x="${x+32}" y="${m2y}" width="28" height="${m2h}" rx="2" fill="${col}" opacity=".85"/><text x="${x+46}" y="${m2y-3}" fill="var(--h)" font-size="8" text-anchor="middle" font-family="var(--mono)" font-weight="700">${m2.toFixed(2)}</text>`;
bars+=`<text x="${x+30}" y="62" fill="var(--cap)" font-size="8" text-anchor="middle" font-weight="700">${label}</text>`;
});
const vmpM1=t.m1_vmp!=null?t.m1_vmp.toFixed(1):"--";
const vmpM2=t.m2_vmp!=null?t.m2_vmp.toFixed(1):"--";
const vmpDir=t.m1_vmp!=null&&t.m2_vmp!=null?(t.m2_vmp>t.m1_vmp+0.5?"var(--grn)":t.m1_vmp>t.m2_vmp+0.5?"var(--red)":"var(--sub)"):"var(--sub)";
return`<div style="background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:10px;font-weight:800;color:var(--sub);letter-spacing:1.5px">SEASON TREND</span><div style="display:flex;gap:8px;align-items:center"><span style="font-size:9px;color:var(--cap)">M1 VMP</span><span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--sub)">${vmpM1}</span><span style="font-size:12px;color:${vmpDir}">&#10140;</span><span style="font-size:9px;color:var(--cap)">M2 VMP</span><span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--h)">${vmpM2}</span></div></div><div style="display:flex;gap:4px;align-items:center;margin-bottom:4px"><span style="font-size:8px;color:var(--cap);opacity:.6;width:20px">M1</span><span style="font-size:8px;color:var(--h);font-weight:700;width:20px">M2</span></div><svg viewBox="0 0 280 68" style="width:100%;height:68px">${bars}<line x1="0" y1="50" x2="280" y2="50" stroke="var(--bd)" stroke-width="0.5" stroke-dasharray="3"/></svg></div>`}


function mkTeamTrend(teamCode){
const tt=TTRENDS[teamCode];if(!tt)return"";
const tc=TC[teamCode];
const m1=tt.m1,m2=tt.m2,szn=tt.szn;
const dir=tt.dir;
const dirColor=dir==="up"?"var(--grn)":dir==="down"?"var(--red)":"var(--sub)";
const dirArrow=dir==="up"?"&#9650;":dir==="down"?"&#9660;":"&#9654;";
const dirLabel=dir==="up"?"RISING":dir==="down"?"FALLING":"STABLE";const teamCvmp=Object.entries(VMP).filter(([n,d])=>d.team===teamCode).reduce((s,[n,d])=>s+(d.cvmp||0),0);
// SVG trend line
const svgW=120,svgH=32,pad=4;
const maxV=Math.max(Math.abs(m1||0),Math.abs(m2||0),2);
const y1=m1!=null?svgH/2-((m1/maxV)*(svgH/2-pad)):svgH/2;
const y2=m2!=null?svgH/2-((m2/maxV)*(svgH/2-pad)):svgH/2;
const lineColor=m2>m1?"var(--grn)":m1>m2?"var(--red)":"var(--sub)";
const svg=`<svg viewBox="0 0 ${svgW} ${svgH}" style="width:${svgW}px;height:${svgH}px"><line x1="0" y1="${svgH/2}" x2="${svgW}" y2="${svgH/2}" stroke="var(--bd)" stroke-width="0.5" stroke-dasharray="2"/><line x1="10" y1="${y1}" x2="${svgW-10}" y2="${y2}" stroke="${lineColor}" stroke-width="2.5" stroke-linecap="round"/><circle cx="10" cy="${y1}" r="3" fill="${tc}" opacity=".5"/><circle cx="${svgW-10}" cy="${y2}" r="3.5" fill="${tc}"/><text x="3" y="${svgH-2}" fill="var(--cap)" font-size="7" font-family="var(--mono)">M1</text><text x="${svgW-14}" y="${svgH-2}" fill="var(--cap)" font-size="7" font-family="var(--mono)">M2</text></svg>`;
// Team player VMP bars
const teamPlayers=Object.entries(VMP).filter(([n,d])=>d.team===teamCode).sort((a,b)=>(b[1].m2_vmp||b[1].vmp||0)-(a[1].m2_vmp||a[1].vmp||0));
let playerBars="";
teamPlayers.forEach(([name,d])=>{
const v=d.m2_vmp||d.vmp||0;const ovr=d.m2_ovr||d.ovr||70;
const bW=Math.min(60,Math.max(3,Math.abs(v)*8));
const bC=v>=2?"var(--grn)":v>=0?tc:v>=-2?"#fbbf24":"var(--red)";
playerBars+=`<div style="display:flex;align-items:center;gap:4px;margin:1px 0"><span style="font-size:8px;font-weight:700;color:var(--cap);width:45px;text-align:right;overflow:hidden">${name.slice(0,6)}</span><span style="font-family:var(--mono);font-size:8px;color:var(--sub);width:16px">${ovr}</span><div style="width:${bW}px;height:6px;background:${bC};border-radius:2px;margin-left:${v>=0?0:0}px"></div><span style="font-family:var(--mono);font-size:8px;font-weight:700;color:${bC}">${v>=0?"+":""}${v.toFixed(1)}</span></div>`;
});
return`<div style="display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--s3)"><div style="flex:1"><div style="display:flex;justify-content:space-between"><span style="font-size:8px;font-weight:700;color:var(--cap);letter-spacing:1px">VMP TREND</span><span style="font-family:var(--mono);font-size:10px;font-weight:800;color:${teamCvmp>=0?"var(--grn)":"var(--red)"}">cVMP ${teamCvmp>=0?"+":""}${teamCvmp.toFixed(1)}</span></div><div style="display:flex;align-items:center;gap:8px"><div>${svg}</div><div style="text-align:center"><span style="font-size:14px;color:${dirColor}">${dirArrow}</span><div style="font-size:7px;font-weight:800;color:${dirColor};letter-spacing:.5px">${dirLabel}</div></div></div></div><div style="flex:1"><div style="font-size:8px;font-weight:700;color:var(--cap);letter-spacing:1px;margin-bottom:4px">ROSTER VMP (M2Q)</div>${playerBars}</div></div>`}

function R(){
const ts=[["home","Home"],["stats","Stats"],["power","Power Rankings"],["results","Results"],["h2h","H2H & LAN"],["chall","Challengers"]];
document.getElementById("TT").innerHTML=ts.map(([k,l])=>`<button class="${tb===k?"on":""}" onclick="tb='${k}';R()">${l}</button>`).join("");
const a=document.getElementById("A");
switch(tb){case"home":a.innerHTML=rHome();break;case"stats":a.innerHTML=rStats();break;case"power":a.innerHTML=rP();break;case"results":a.innerHTML=rResults();break;case"h2h":a.innerHTML=rH();break;case"chall":a.innerHTML=rChall();break}}
R();
</script></body></html>
